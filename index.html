}

// ─── Thought picker (after multi-entry) ──────────────────
async function pickThoughtToWork(thoughts) {
  await botBubble('Which thought would you like to work on first? You can come back to the others after.');

  const pickW = document.createElement('div');
  pickW.className = 'widget';
  pickW.innerHTML = '<div class="widget-label">Choose a thought to work on</div>'
    + '<div style="display:flex;flex-direction:column;gap:.4rem" id="thought-pick-list"></div>';
  messagesEl.appendChild(pickW);
  scrollBottom();

  thoughts.forEach((thought, idx) => {
    const worked = (session.workedThoughts || []).includes(thought);
    const btn = document.createElement('button');
    btn.className = 'technique-card';
    btn.style.cssText = 'text-align:left;padding:.625rem .875rem' + (worked ? ';opacity:.4;border-style:dashed' : '');
    btn.innerHTML = '<span style="font-size:.72rem;color:var(--accent);margin-right:.4rem">' + (idx+1) + '.</span>'
      + '<span style="font-size:.85rem;line-height:1.5;color:' + (worked ? 'var(--muted)' : 'var(--text)') + '">' + escHtml(thought) + '</span>'
      + (worked ? '<span style="font-size:.62rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1px 7px;margin-left:.5rem">✓ worked</span>' : '');
    btn.addEventListener('click', () => {
      pickW.style.opacity = '.5'; pickW.style.pointerEvents = 'none';
      const worked = session.workedThoughts || [];
      resetForThought(thought, thoughts, worked);
      botBubble('Working on: <em>"' + escHtml(thought) + '"</em>').then(() => runStage(2));
    });
    pickW.querySelector('#thought-pick-list').appendChild(btn);
  });
}


// ─── Build Summary HTML (used in-session and in review modal) ────
function buildSummaryHTML(s, drop, dropColor, dropLabel) {
  const distortions = Array.isArray(s.distortions) ? s.distortions.join(', ') : (s.distortions || '—');
  const reframing   = s.reframing  || '—';
  const rational    = s.rational   || '—';
  const tr          = s.techniqueResults || {};

  const techniqueRows = [];
  if (tr.h4o)      techniqueRows.push('<div class="summary-row"><span class="label">4 Options</span><span class="value">' + escHtml((tr.h4o.optionName||tr.h4o.option||'') + ' · ' + (tr.h4o.reflection||'').substring(0,80)) + '</span></div>');
  if (tr.sfc)      techniqueRows.push('<div class="summary-row"><span class="label">Self-Forgiveness</span><span class="value">' + escHtml((tr.sfc.reasons||[]).map(r=>r.charAt(0).toUpperCase()+r.slice(1)).join(', ') + ' · ' + (tr.sfc.reflection||'').substring(0,80)) + '</span></div>');
  if (tr.cba)      techniqueRows.push('<div class="summary-row"><span class="label">CBA Balance</span><span class="value">' + escHtml(tr.cba.balance||'') + '</span></div>');
  if (tr.ete)      techniqueRows.push('<div class="summary-row"><span class="label">Evidence Against</span><span class="value">' + escHtml(((tr.ete.against||[]).join ? (tr.ete.against||[]).join(', ') : (tr.ete.against||'')).substring(0,120)) + '</span></div>');
  if (tr.socratic) techniqueRows.push('<div class="summary-row"><span class="label">Socratic Q&amp;A</span><span class="value">' + escHtml((tr.socratic||[]).map(q=>q.q).join(' / ').substring(0,120)) + '</span></div>');
  if (tr.shades)   techniqueRows.push('<div class="summary-row"><span class="label">Shades Rating</span><span class="value">' + escHtml(tr.shades.rating+'% · '+tr.shades.nuanced.substring(0,80)) + '</span></div>');
  if (tr.define)   techniqueRows.push('<div class="summary-row"><span class="label">Label Defined</span><span class="value">' + escHtml('"'+(tr.define.label||'')+'" — '+(tr.define.applies||'').substring(0,80)) + '</span></div>');

  const callout = (drop > 0) ? (
    '<div class="belief-reduction-callout">'
    + '<div class="brc-label">Belief Reduced By</div>'
    + '<div class="brc-numbers">−' + drop + ' points</div>'
    + '<div class="brc-sub">' + s.initialBelief + '% → ' + s.finalBelief + '% · That\'s real progress</div>'
    + '</div>'
  ) : '';

  return (
    '<div class="summary-title">✦ Session Report</div>'
    + '<div class="belief-change">'
    + '<span class="from">' + (s.initialBelief||'?') + '%</span>'
    + '<span class="arrow">→</span>'
    + '<span class="to">' + (s.finalBelief||'?') + '%</span>'
    + '<div class="drop" style="color:' + (dropColor||'var(--muted)') + '">' + (dropLabel||'') + '</div>'
    + '</div>'
    + callout
    + '<div class="summary-row"><span class="label">Event</span><span class="value">' + escHtml(s.event||'') + '</span></div>'
    + '<div class="summary-row"><span class="label">Thought</span><span class="value">' + escHtml(s.thought||'') + '</span></div>'
    + '<div class="summary-row"><span class="label">Distortions</span><span class="value">' + escHtml(distortions) + '</span></div>'
    + techniqueRows.join('')
    + '<div class="summary-row"><span class="label">Positive Reframing</span><span class="value">' + escHtml(reframing) + '</span></div>'
    + '<div class="summary-row"><span class="label">Rational Response</span><span class="value">' + escHtml(rational) + '</span></div>'
  );
}

// ─── Session Review Modal ─────────────────────────────────
function openSessionReview(savedIdx) {
  const saved = JSON.parse(localStorage.getItem('cbt_sessions') || '[]');
  const s = saved[savedIdx];
  if (!s) return;

  const drop = (s.initialBelief != null && s.finalBelief != null) ? s.initialBelief - s.finalBelief : 0;
  const dropColor = drop > 0 ? '#4ade80' : drop < 0 ? 'var(--danger)' : 'var(--muted)';
  const dropLabel = drop > 0 ? '↓ ' + drop + '% reduction' : drop < 0 ? '↑ ' + Math.abs(drop) + '% increase' : 'No change';

  const tr = s.techniqueResults || {};
  const distortions = Array.isArray(s.distortions) ? s.distortions.join(', ') : (s.distortions || '—');

  // Build technique detail sections
  let techSections = '';
  const techLabels = { cba:'Cost-Benefit Analysis', ete:'Examine the Evidence', socratic:'Socratic Method', shades:'Thinking in Shades of Gray', define:"Let's Define Terms", ev:'Externalization of Voices' };
  (s.techniques || []).forEach(tid => {
    const name = techLabels[tid] || tid;
    let detail = '';
    if (tid === 'cba' && tr.cba) {
      const pros = (tr.cba.pros||[]).join(', ') || '—';
      const cons = (tr.cba.cons||[]).join(', ') || '—';
      detail = '<div style="font-size:.75rem;color:var(--muted);margin-top:.25rem"><strong style="color:#4ade80">Benefits:</strong> ' + escHtml(pros) + '<br><strong style="color:var(--danger)">Costs:</strong> ' + escHtml(cons) + '<br><strong>Balance:</strong> ' + escHtml(tr.cba.balance||'') + '</div>';
    } else if (tid === 'ete' && tr.ete) {
      const forIt = (tr.ete.for||[]).join(', ') || '—';
      const against = Array.isArray(tr.ete.against) ? tr.ete.against.join(', ') : (tr.ete.against||'—');
      detail = '<div style="font-size:.75rem;color:var(--muted);margin-top:.25rem"><strong style="color:var(--danger)">For:</strong> ' + escHtml(forIt) + '<br><strong style="color:#4ade80">Against:</strong> ' + escHtml(against) + '</div>';
    } else if (tid === 'socratic' && tr.socratic) {
      detail = '<div style="font-size:.75rem;color:var(--muted);margin-top:.25rem">' + (tr.socratic||[]).map(q => '<div style="margin-bottom:.3rem"><em style="color:var(--accent2)">' + escHtml(q.q||'') + '</em><br>' + escHtml(q.a||'') + '</div>').join('') + '</div>';
    } else if (tid === 'shades' && tr.shades) {
      detail = '<div style="font-size:.75rem;color:var(--muted);margin-top:.25rem">Real rating: <strong>' + tr.shades.rating + '%</strong><br>' + escHtml(tr.shades.nuanced||'') + '</div>';
    } else if (tid === 'define' && tr.define) {
      detail = '<div style="font-size:.75rem;color:var(--muted);margin-top:.25rem">Label: <strong>"' + escHtml(tr.define.label||'') + '"</strong><br>Definition: ' + escHtml(tr.define.meaning||'') + '<br>Applies: ' + escHtml(tr.define.applies||'') + '</div>';
    } else if (tid === 'sfc' && tr.sfc) {
      const rLbls = { deficiency: 'Deficiency', ignorance: 'Ignorance', disturbance: 'Disturbance' };
      detail = '<div style="font-size:.75rem;color:var(--muted);margin-top:.25rem"><strong>Reasons:</strong> ' + escHtml((tr.sfc.reasons||[]).map(r=>rLbls[r]||r).join(', ')) + '<br>' + escHtml(tr.sfc.reflection||'') + '</div>';
    } else if (tid === 'ev' && tr.ev && tr.ev.rounds) {
      detail = '<div style="font-size:.75rem;color:var(--muted);margin-top:.25rem">' + (tr.ev.rounds||[]).map((r,i) => '<div style="margin-bottom:.4rem"><strong>Round ' + (i+1) + ':</strong> <span style="color:var(--danger)">' + escHtml(r.attack||'') + '</span><br>Defense: ' + escHtml(r.defense||'') + '<br><span style="color:#4ade80">' + escHtml(r.score||'') + '</span></div>').join('') + '</div>';
    }
    techSections += '<div class="review-technique-item"><div class="review-technique-name">' + escHtml(name) + '</div>' + detail + '</div>';
  });

  const isPaused = s.paused;
  const statusBadge = isPaused
    ? '<span class="s-status-paused" style="font-size:.7rem">⏸ Paused</span>'
    : '<span class="s-status-done" style="font-size:.7rem">✓ Complete</span>';

  const overlay = document.createElement('div');
  overlay.className = 'review-overlay';
  overlay.innerHTML =
    '<div class="review-panel">'
    + '<div class="review-header">'
    + '<div><div class="review-title">Session Review</div>'
    + '<div style="font-size:.68rem;color:var(--muted);margin-top:.1rem">' + formatDate(s.ts) + ' · ' + statusBadge + '</div></div>'
    + '<button class="review-close" id="rv-close">✕</button>'
    + '</div>'
    + '<div class="review-body">'

    // Belief change
    + '<div class="review-section">'
    + '<div class="review-section-label">Belief Change</div>'
    + '<div class="review-belief-bar">'
    + '<span class="review-belief-from">' + (s.initialBelief||'?') + '%</span>'
    + '<span class="review-belief-arrow">→</span>'
    + '<span class="review-belief-to">' + (s.finalBelief != null ? s.finalBelief + '%' : '—') + '</span>'
    + '<span class="review-belief-drop" style="color:' + dropColor + '">' + dropLabel + '</span>'
    + '</div></div>'

    // Event & thought
    + '<div class="review-section"><div class="review-section-label">Upsetting Event</div>'
    + '<div class="review-section-value">' + escHtml(s.event||'—') + '</div></div>'
    + '<div class="review-section"><div class="review-section-label">Negative Thought</div>'
    + '<div class="review-section-value" style="color:var(--danger);font-style:italic">"' + escHtml(s.thought||'—') + '"</div></div>'

    // Distortions
    + (distortions !== '—' ? '<div class="review-section"><div class="review-section-label">Cognitive Distortions</div><div class="review-section-value">' + escHtml(distortions) + '</div></div>' : '')

    // Techniques
    + (techSections ? '<div class="review-section"><div class="review-section-label">Techniques Used</div>' + techSections + '</div>' : '')

    // Reframing
    + (s.reframing ? '<div class="review-section"><div class="review-section-label">Positive Reframing</div><div class="review-section-value">' + escHtml(s.reframing) + '</div></div>' : '')

    // Rational response
    + (s.rational ? '<div class="review-section"><div class="review-section-label">Rational Response</div><div class="review-section-value" style="color:#4ade80">' + escHtml(s.rational) + '</div></div>' : '')

    // Resume button if paused
    + (isPaused ? '<button class="s-resume-btn" id="rv-resume" data-i="' + savedIdx + '" style="margin-top:.25rem">▶ Resume This Session</button>' : '')

    + '</div></div>';

  overlay.querySelector('#rv-close').addEventListener('click', () => document.body.removeChild(overlay));
  overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });
  overlay.querySelector('#rv-resume')?.addEventListener('click', (e) => {
    e.stopPropagation();
    document.body.removeChild(overlay);
    resumeSession(parseInt(e.target.dataset.i));
  });

  document.body.appendChild(overlay);
}


// ─── Hauck 4 Options (interpersonal events) ──────────────
function isInterpersonalEvent(text) {
  const t = text.toLowerCase();
  // Pronouns referring to others
  const pronouns = /\b(he|she|they|him|her|them|his|hers|their)\b/;
  // Relational nouns
  const relations = /\b(boss|manager|colleague|coworker|friend|partner|wife|husband|girlfriend|boyfriend|mother|father|mom|dad|parent|sister|brother|sibling|teacher|professor|therapist|doctor|neighbour|neighbor|roommate|flatmate|classmate)\b/;
  return pronouns.test(t) || relations.test(t);
}

async function showHauck4Options() {
  const OPTIONS = [
    { id: 'tolerate', name: 'Tolerate without resentment', desc: 'Accept the situation and genuinely let go of the anger. You stay, and you make peace with it.', warn: false },
    { id: 'protest',  name: 'Protest', desc: "Speak up, set a boundary, or try to change the other person's behaviour. Introduce some productive friction.", warn: false },
    { id: 'separate', name: 'Leave / Separate', desc: 'Remove yourself from the situation or relationship if it cannot change and cannot be accepted.', warn: false },
    { id: 'resent',   name: 'Tolerate with resentment', desc: 'Stay in the situation and keep suffering. The most common choice — and the most damaging.', warn: true },
  ];

  await botBubble('This sounds like it involves another person.<br><br><strong style="color:var(--accent2)">A quick reflection before we continue</strong> — Hauck identifies four ways people respond to interpersonal frustration. Which feels most like what you\'re doing right now?<br><br><em style="font-size:.78rem;color:var(--muted)">This is just for your awareness — it won\'t change the session. Skip if you prefer.</em>');

  return new Promise(resolve => {
    const myToken = sessionToken;
    let selected = null;

    const cards = OPTIONS.map(o =>
      '<div class="h4o-card' + (o.warn ? ' warn' : '') + '" data-id="' + o.id + '">'
      + '<div class="h4o-name">' + o.name + '</div>'
      + '<div class="h4o-desc">' + o.desc + '</div>'
      + (o.warn ? '<div class="h4o-warn">⚠ Hauck considers this the worst option — it combines the costs of staying with the costs of resentment.</div>' : '')
      + '</div>'
    ).join('');

    const w = appendWidget(
      '<div class="widget-label" style="color:var(--accent2)">How are you responding to this situation?</div>'
      + '<div style="display:flex;flex-direction:column;gap:.375rem;margin-bottom:.75rem" id="h4o-cards">' + cards + '</div>'
      + '<div style="display:flex;gap:.5rem;flex-wrap:wrap">'
      + '<button class="btn-proceed" id="h4o-continue" disabled>Continue →</button>'
      + '<button class="btn-another" id="h4o-skip">Skip</button>'
      + '</div>'
    );

    w.querySelectorAll('.h4o-card').forEach(card => {
      card.addEventListener('click', () => {
        w.querySelectorAll('.h4o-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selected = card.dataset.id;
        w.querySelector('#h4o-continue').disabled = false;
      });
    });

    const finish = async (choice) => {
      if (sessionToken !== myToken) { resolve(); return; }
      w.style.opacity = '.5';
      w.style.pointerEvents = 'none';

      if (choice) {
        const opt = OPTIONS.find(o => o.id === choice);
        userBubble(opt.name);
        if (choice === 'resent') {
          await botBubble('That\'s the most honest answer — and the most common one. The CBT work ahead can help you move toward genuine acceptance or toward a decision to act. Let\'s continue.');
        } else if (choice === 'tolerate') {
          await botBubble('That\'s a healthy goal. The work ahead will help build the genuine acceptance that makes tolerating without resentment possible.');
        } else if (choice === 'protest') {
          await botBubble('Good. The session will help clarify your thinking so any conversation or boundary-setting comes from a calm, clear place.');
        } else if (choice === 'separate') {
          await botBubble('Noted. The work ahead will help you think through this clearly.');
        }
        session.interpersonalOption = choice;
      }
      resolve();
    };

    w.querySelector('#h4o-continue').addEventListener('click', () => finish(selected));
    w.querySelector('#h4o-skip').addEventListener('click', () => finish(null));
  });
}

// ─── Stage Machine ────────────────────────────────────────
async function runStage(s) {
  stage = s;
  updatePips();
  // Show pause button when a session is in progress (stages 1-7)
  const pauseBtn = document.getElementById('pause-session-btn');
  if (pauseBtn) pauseBtn.style.display = (s >= 1 && s <= 7) ? 'flex' : 'none';
  setInputDisabled(true);

  // Stage 0 — Check-in / Upsetting Event
  if (s === 0) {
    await botBubble(`<strong style="font-family:'Playfair Display',serif;color:var(--accent)">Welcome to your TEAM·CBT session.</strong><br><br>
I'm here to guide you through David Burns' evidence-based process. Everything stays on your device.<br><br>
To begin — <em>what happened?</em> Describe the upsetting event or situation that's been troubling you.`);
    setInputDisabled(false);
    userInput.placeholder = 'Describe what happened…';
    userInput.focus();
    const tok0 = sessionToken;
    sendBtn.onclick = async () => {
      if (sessionToken !== tok0) { sendBtn.onclick = null; return; }
      const val = userInput.value.trim();
      if (!val) return;
      session.event = val;
      userInput.value = '';
      sendBtn.onclick = null; userInput.onkeydown = null;
      userBubble(val);
      runStage(1);
    };
    userInput.onkeydown = e => { if (e.key === 'Enter') sendBtn.click(); };
  }

  // Stage 1 — Negative Thoughts (multi-entry, pick one)
  else if (s === 1) {
    await botBubble(`Thank you for sharing that. It takes courage to look at this closely.<br><br>
When you think about this event — what negative thoughts are going through your mind? <strong>List all the thoughts connected to it</strong>, one per row.<br><br>
Try to capture each as a specific sentence (e.g. <em>"I am a failure"</em>, <em>"No one respects me"</em>). Then you'll pick one to work on first.`);
    setInputDisabled(true);

    const thoughtsW = document.createElement('div');
    thoughtsW.className = 'widget';
    thoughtsW.innerHTML = '<div class="widget-label">Negative Thoughts about this Event</div>'
      + '<div id="thought-rows" style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:.625rem"></div>'
      + '<button class="add-row-btn" id="thought-add">+ Add another thought</button>'
      + '<button class="btn-submit" id="thought-done" style="margin-top:.75rem;width:100%" disabled>Choose which to work on →</button>';
    messagesEl.appendChild(thoughtsW);
    scrollBottom();

    function addThoughtRow(val) {
      const container = thoughtsW.querySelector('#thought-rows');
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:.4rem;align-items:center';
      const inp = document.createElement('input'); inp.type='text'; inp.className='list-row-input';
      inp.placeholder = 'e.g. I am a failure, no one cares about me…'; inp.value = val||'';
      inp.style.flex = '1';
      inp.addEventListener('input', updateDoneBtn);
      const del = document.createElement('button'); del.className='list-row-del'; del.innerHTML='×';
      del.addEventListener('click', () => { if (container.querySelectorAll('div').length > 1) { row.remove(); updateDoneBtn(); } });
      row.appendChild(inp); row.appendChild(del);
      container.appendChild(row);
      inp.focus();
    }

    function updateDoneBtn() {
      const vals = Array.from(thoughtsW.querySelectorAll('#thought-rows input')).map(i => i.value.trim()).filter(Boolean);
      thoughtsW.querySelector('#thought-done').disabled = vals.length === 0;
    }

    addThoughtRow('');
    thoughtsW.querySelector('#thought-add').addEventListener('click', () => { addThoughtRow(''); scrollBottom(); });

    const tok1 = sessionToken;
    thoughtsW.querySelector('#thought-done').addEventListener('click', () => {
      const vals = Array.from(thoughtsW.querySelectorAll('#thought-rows input')).map(i => i.value.trim()).filter(Boolean);
      if (!vals.length) return;
      if (sessionToken !== tok1) return;
      session.thoughts = vals;
      thoughtsW.style.opacity = '.5'; thoughtsW.style.pointerEvents = 'none';

      if (vals.length === 1) {
        session.thought = vals[0];
        userBubble(vals[0]);
        runStage(2);
        return;
      }

      // Show picker
      userBubble('I have these thoughts: \n' + vals.map((t,i) => (i+1)+'. '+t).join('\n'));
      pickThoughtToWork(vals);
    });
  }

  // Stage 2 — Initial Belief
  else if (s === 2) {
    await botBubble(`"<em>${escHtml(session.thought)}</em>"<br><br>Right now, in your gut — <strong>how much do you believe this thought is true?</strong> Use the slider below.`);
    setInputDisabled(true);
    buildSliderWidget('Initial Belief Score', 'Lock it in →', (val) => {
      session.initialBelief = val;
      userBubble(`I believe this ${val}%`);
      showThoughtBanner();
      runStage(3);
    });
  }

  // Stage 3 — Distortions
  else if (s === 3) {
    await botBubble(`Initial belief: <strong style="color:var(--accent)">${session.initialBelief}%</strong>.<br><br>
Now let's examine the <em>structure</em> of that thought. Burns identified <strong>10 Cognitive Distortions</strong> — and Paul Hauck adds a crucial 11th: <strong>Self-Rating</strong>, judging your whole self by a single flaw or failure.<br><br>Which ones do you see in your thought?`);
    setInputDisabled(true);
    buildDistortionsWidget(async (names) => {
      session.distortions = names;
      userBubble(`I see: ${names.join(', ')}`);
      runStage(4);
    });
  }


  // Stage 4 — Positive Reframing
  else if (s === 4) {
    await botBubble(`Before we challenge the thought directly, let's do something counterintuitive.<br><br>
<strong style="color:var(--gold)">✦ Positive Reframing</strong><br><br>
Your negative feelings and thoughts — as painful as they are — may actually reflect something <em>meaningful</em> about you.<br><br>
In the box below, explore: <strong>What are the possible advantages of this thought or feeling? What does it say about you that's actually positive — your values, your care, your standards?</strong>`);
    setInputDisabled(true);
    const reframeW = appendWidget(`
      <div class="widget-label">Positive Reframing · Melt the resistance</div>
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:.625rem;line-height:1.6">
        Examples: <em>"This feeling shows I care deeply about…"</em> · <em>"This thought protects me from…"</em> · <em>"It reflects my high standards for…"</em>
      </div>
      <textarea class="chat-textarea" rows="4" placeholder="The advantages of this thought/feeling are… and it shows that I…" id="reframe-ta"></textarea>
      <button class="btn-submit" id="reframe-btn" style="margin-top:.625rem">Continue → Choose a Technique →</button>
    `);
    reframeW.querySelector('#reframe-btn').addEventListener('click', () => {
      const val = reframeW.querySelector('#reframe-ta').value.trim();
      if (!val) { reframeW.querySelector('#reframe-ta').style.borderColor='var(--danger)'; setTimeout(()=>reframeW.querySelector('#reframe-ta').style.borderColor='',800); return; }
      session.reframing = val;
      reframeW.style.opacity = '.5';
      reframeW.style.pointerEvents = 'none';
      userBubble(val);
      runStage(5);
    });

    attachTherapist(reframeW, 'reframing', () => 'What they have written so far: "' + (reframeW.querySelector('#reframe-ta').value || 'nothing yet') + '"');
  }

  // Stage 5 — Technique Picker
  else if (s === 5) {
    const usedTechniques = session.techniques || [];
    const all = [
      { id: 'cba',      name: 'Cost-Benefit Analysis',       desc: 'List every advantage and disadvantage of the negative thought, then weigh them on a 100-point scale.' },
      { id: 'ete',      name: 'Examine the Evidence',        desc: 'Gather the actual facts - evidence that supports the thought and evidence that contradicts it.' },
      { id: 'socratic', name: 'Socratic Method',             desc: 'Ask probing questions that expose the hidden assumptions and logical inconsistencies in your thought.' },
      { id: 'shades',   name: 'Thinking in Shades of Gray',  desc: 'Replace black-and-white thinking with a spectrum. Rate the thought and write a more accurate, partial version.' },
      { id: 'define',   name: "Let's Define Terms",          desc: 'Challenge loaded labels like loser by asking what they literally mean and whether that can ever be 100% true of anyone.' },
      { id: 'ev',       name: 'Externalization of Voices',   desc: "Burns' most powerful technique. The negative voice attacks you with your own thoughts; the positive voice defends. Requires 2–3 AI exchanges per thought.", special: 'powerful' },
      { id: 'sfc',      name: 'Self-Forgiveness Check',       desc: "Hauck: three reasons that always justify forgiving yourself — Deficiency, Ignorance, or Disturbance. For guilt and shame-based thoughts.", special: 'hauck' },
      { id: 'h4o',      name: "Hauck's 4 Options",              desc: "For events involving another person. Clarifies your real choices: tolerate without resentment, protest, separate, or tolerate with resentment (the worst option).", special: 'hauck' },
    ];
    // Mark SFC as recommended if Self-Rating or Labeling distortion was selected
    const selfRatingSelected = (session.distortions || []).some(d => d === 'Self-Rating' || d === 'Labeling');
    if (selfRatingSelected) {
      const sfcEntry = all.find(t => t.id === 'sfc');
      if (sfcEntry) sfcEntry.recommended = true;
    }
    const available = all.filter(t => !usedTechniques.includes(t.id));
    const usedLabel = usedTechniques.length > 0
      ? '<div style="font-size:.75rem;color:var(--muted);margin-bottom:.5rem">Done: ' + usedTechniques.map(id => all.find(t=>t.id===id)?.name).join(', ') + '</div>'
      : '';

    await botBubble(usedTechniques.length === 0
      ? 'Great work on the reframing. Now let us use a specific Burns technique to examine your thought more deeply.'
      : 'Well done. Would you like to try another technique, or move on to writing your Rational Response?'
    );

    const cards = available.map(t => {
      let badge = '';
      let cardStyle = '';
      if (t.special === 'powerful') {
        badge = '<span style="font-size:.6rem;color:#f59e0b;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:20px;padding:1px 7px;margin-left:.4rem;vertical-align:middle">⚡ Most Powerful</span>';
        cardStyle = 'border-color:rgba(245,158,11,.3);';
      } else if (t.special === 'hauck') {
        badge = '<span style="font-size:.6rem;color:#a78bfa;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);border-radius:20px;padding:1px 7px;margin-left:.4rem;vertical-align:middle">Hauck</span>';
        cardStyle = 'border-color:rgba(167,139,250,.3);';
      }
      if (t.recommended) {
        badge += '<span style="font-size:.6rem;color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);border-radius:20px;padding:1px 7px;margin-left:.3rem;vertical-align:middle">★ Recommended</span>';
        cardStyle += 'border-color:rgba(74,222,128,.4);';
      }
      return '<button class="technique-card" data-tid="' + t.id + '" style="' + cardStyle + '"><span class="tc-name">' + t.name + badge + '</span><span class="tc-desc">' + t.desc + '</span></button>';
    }).join('');

    const skipBtn = usedTechniques.length > 0
      ? '<button class="btn-proceed" id="skip-to-rational" style="margin-top:.875rem;width:100%">I am ready to write my Rational Response</button>'
      : '';

    const pickW = appendWidget(
      '<div class="widget-label">Choose a Technique</div>' +
      usedLabel +
      '<div class="technique-cards">' + cards + '</div>' +
      skipBtn
    );

    pickW.querySelectorAll('.technique-card').forEach(btn => {
      btn.addEventListener('click', () => {
        pickW.style.opacity = '.5';
        pickW.style.pointerEvents = 'none';
        const tid = btn.dataset.tid;
        userBubble(btn.querySelector('.tc-name').textContent);
        runTechnique(tid);
      });
    });

    const skipEl = pickW.querySelector('#skip-to-rational');
    if (skipEl) {
      skipEl.addEventListener('click', () => {
        pickW.style.opacity = '.5';
        pickW.style.pointerEvents = 'none';
        userBubble('I am ready to write my Rational Response');
        runStage(6);
      });
    }

    attachTherapist(pickW, 'technique_picker');
    setInputDisabled(true);
  }

  // Stage 6 — Rational Response
  else if (s === 6) {
    const dList = session.distortions.map(d => `<span style="color:var(--accent);font-size:.78rem;background:rgba(127,216,190,.1);padding:2px 7px;border-radius:12px;display:inline-block;margin:2px">${d}</span>`).join(' ');
    await botBubble(`Great insight. You spotted: ${dList}<br><br>
Now the hardest part — <strong>write a Rational Response</strong> that directly challenges your negative thought.<br><br>
A good Rational Response is specific, honest, and <em>actually believable to you</em> — not just positive affirmations. If you get stuck, hit <strong>Call Therapist</strong>.`);
    setInputDisabled(true);
    buildTextareaWidget(
      'Your Rational Response',
      'Write a balanced, truthful counter to your negative thought…',
      'This is my response →',
      (val) => {
        session.rational = val;
        userBubble(val);
        runStage(7);
      }
    );
  }

  // Stage 7 — Final Belief
  else if (s === 7) {
    await botBubble(`That took real work. Well done.<br><br>
After writing your Rational Response — <strong>how much do you now believe the original thought?</strong><br><em>"${escHtml(session.thought)}"</em>`);
    setInputDisabled(true);
    buildSliderWidget('Final Belief Score', 'Complete Session ✓', (val) => {
      session.finalBelief = val;
      userBubble(`I now believe this ${val}%`);
      runStage(8);
    });
  }

  // Stage 8 — Summary + Save
  else if (s === 8) {
    stage = 8;
    updatePips();
    // Track this thought as worked
    session.workedThoughts = session.workedThoughts || [];
    if (session.thought && !session.workedThoughts.includes(session.thought)) {
      session.workedThoughts.push(session.thought);
    }
    const drop = session.initialBelief - session.finalBelief;
    const dropColor = drop > 0 ? '#4ade80' : drop < 0 ? 'var(--danger)' : 'var(--muted)';
    const dropLabel = drop > 0 ? `↓ ${drop}% reduction` : drop < 0 ? `↑ ${Math.abs(drop)}% increase` : 'No change';

    await botBubble(`Session complete. Here's your summary:`);

    const summaryEl = document.createElement('div');
    summaryEl.className = 'summary-card';
    summaryEl.innerHTML = buildSummaryHTML(session, drop, dropColor, dropLabel);
    messagesEl.appendChild(summaryEl);
    scrollBottom();

    // Save to localStorage
    const saved = JSON.parse(localStorage.getItem('cbt_sessions') || '[]');
    saved.unshift({ ...session, ts: Date.now() });
    localStorage.setItem('cbt_sessions', JSON.stringify(saved.slice(0, 50)));
    renderSessionList();

    await botBubble(`${drop > 0
      ? `Remarkable — you reduced your belief by <strong style="color:#4ade80">${drop} points</strong>.`
      : drop === 0
      ? `The belief score didn't change, and that's okay. Change takes time and repetition.`
      : `The score moved up slightly — this is normal. Sometimes naming a thought makes it feel more real before it loosens. Keep going.`
    } <br><br>This session is saved to your History. You can start a new session anytime.`);

    setInputDisabled(true);
    userInput.placeholder = 'Session complete. Start a new session above.';

    // Offer remaining thoughts if any
    const remaining = (session.thoughts || []).filter(t => t !== session.thought && !(session.workedThoughts || []).includes(t));
    if (remaining.length > 0) {
      await new Promise(r => setTimeout(r, 800));
      const plural = remaining.length === 1 ? 'one more thought' : remaining.length + ' more thoughts';
      await botBubble('You still have <strong>' + plural + '</strong> connected to this event. Would you like to work on one now?');

      const remainW = appendWidget(
        '<div class="widget-label">Continue with another thought?</div>'
        + '<div style="display:flex;flex-direction:column;gap:.4rem" id="remaining-list">'
        + remaining.map(t => { const w = (session.workedThoughts||[]).includes(t); return '<div class="switch-thought-item" data-thought="' + escHtml(t) + '" style="cursor:pointer;' + (w ? 'opacity:.4;border-style:dashed' : '') + '">"' + escHtml(t) + '"' + (w ? ' <span style="font-size:.62rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1px 6px;margin-left:.35rem">✓ worked</span>' : '') + '</div>'; }).join('')
        + '</div>'
        + '<button class="btn-proceed" id="skip-remaining" style="margin-top:.625rem;width:100%;background:none;color:var(--muted);border-color:var(--border)">Not right now</button>'
      );

      remainW.querySelectorAll('.switch-thought-item').forEach(el => {
        el.addEventListener('click', () => {
          const newThought = el.dataset.thought;
          remainW.style.opacity = '.5'; remainW.style.pointerEvents = 'none';
          userBubble('"' + newThought + '"');
          const allThoughtsR = session.thoughts || [];
          const prevWorkedR = session.workedThoughts || [];
          if (session.thought && !prevWorkedR.includes(session.thought)) prevWorkedR.push(session.thought);
          resetForThought(newThought, allThoughtsR, prevWorkedR);
          botBubble('Now working on: <em>"' + escHtml(newThought) + '"</em>').then(() => runStage(2));
        });
      });

      remainW.querySelector('#skip-remaining').addEventListener('click', () => {
        remainW.style.opacity = '.5'; remainW.style.pointerEvents = 'none';
        userBubble('Not right now');
        botBubble("No problem. Your other thoughts are saved. Come back whenever you're ready.");
      });
    }
  }
}

function setInputDisabled(v) {
  userInput.disabled = v;
  sendBtn.disabled = v;
}

// ─── Session List ─────────────────────────────────────────
function renderSessionList() {
  const saved = JSON.parse(localStorage.getItem('cbt_sessions') || '[]');
  if (saved.length === 0) {
    sessionList.innerHTML = '<div class="empty-sessions">No sessions yet.<br>Start a session or finish one to see it here.</div>';
    return;
  }

  // Group sessions by event text
  const groups = [];
  const eventMap = {};
  saved.forEach((s, i) => {
    const key = (s.event || '').trim();
    if (!eventMap[key]) {
      eventMap[key] = { event: key, ts: s.ts, items: [] };
      groups.push(eventMap[key]);
    }
    eventMap[key].items.push({ s, i });
    // Keep latest ts for the group header date
    if (s.ts > eventMap[key].ts) eventMap[key].ts = s.ts;
  });

  sessionList.innerHTML = '';

  groups.forEach((group, gi) => {
    const groupEl = document.createElement('div');
    groupEl.className = 'sg-group';
    // Auto-open if only one group or if it has a paused/partial item
    const hasActive = group.items.some(({ s }) => s.paused || s.partial);
    if (gi === 0 || hasActive) groupEl.classList.add('open');

    const countLabel = group.items.length === 1 ? '1 thought' : group.items.length + ' thoughts';
    const eventSnippet = group.event.substring(0, 42) + (group.event.length > 42 ? '…' : '');

    // Header row
    const header = document.createElement('div');
    header.className = 'sg-header';
    header.innerHTML =
      '<span class="sg-chevron">▶</span>'
      + '<span class="sg-event" title="' + escHtml(group.event) + '">' + escHtml(eventSnippet) + '</span>'
      + '<span class="sg-count">' + countLabel + '</span>'
      + '<span class="sg-date">' + formatDate(group.ts) + '</span>';
    header.addEventListener('click', () => groupEl.classList.toggle('open'));
    groupEl.appendChild(header);

    // Thoughts list (collapsible)
    const thoughtsEl = document.createElement('div');
    thoughtsEl.className = 'sg-thoughts';

    group.items.forEach(({ s, i }) => {
      const isPaused = s.paused === true;
      const isPartial = s.partial === true && !isPaused;
      const drop = (s.initialBelief != null && s.finalBelief != null) ? s.initialBelief - s.finalBelief : null;

      let statusHTML = '';
      if (isPaused) statusHTML = '<span class="s-status-paused">⏸ ' + (s.stageName || 'Stage ' + s.stage) + '</span>';
      else if (isPartial) statusHTML = '<span class="s-status-paused">↩ Switched</span>';
      else statusHTML = '<span class="s-status-done">✓ Done</span>';

      let deltaHTML = '';
      if (drop !== null) {
        const cls = drop > 0 ? 'delta-pos' : drop < 0 ? 'delta-neg' : '';
        const sign = drop > 0 ? '↓' : drop < 0 ? '↑' : '→';
        deltaHTML = '<div class="s-delta ' + cls + '">' + sign + Math.abs(drop) + 'pts · ' + s.initialBelief + '%→' + s.finalBelief + '%</div>';
      } else if (s.initialBelief != null) {
        deltaHTML = '<div class="s-delta" style="color:var(--muted)">' + s.initialBelief + '% initial</div>';
      }

      const resumeHTML = (isPaused || isPartial)
        ? '<button class="s-resume-btn" data-i="' + i + '">▶ Resume</button>' : '';

      const thoughtSnippet = (s.thought || s.event || '').substring(0, 48);
      const thoughtFull = s.thought || s.event || '';

      const itemEl = document.createElement('div');
      itemEl.className = 'session-item';
      itemEl.dataset.i = i;
      itemEl.style.cursor = 'pointer';
      itemEl.addEventListener('click', (e) => { if (!e.target.closest('.s-resume-btn')) openSessionReview(i); });
      itemEl.innerHTML =
        '<div style="display:flex;align-items:center;gap:.35rem;flex-wrap:wrap">'
        + statusHTML
        + '<span class="s-event" title="' + escHtml(thoughtFull) + '">"' + escHtml(thoughtSnippet) + (thoughtFull.length > 48 ? '…' : '') + '"</span>'
        + '</div>'
        + deltaHTML + resumeHTML;

      itemEl.querySelector('.s-resume-btn')?.addEventListener('click', (e) => {
        e.stopPropagation();
        resumeSession(i);
      });

      thoughtsEl.appendChild(itemEl);
    });

    groupEl.appendChild(thoughtsEl);
    sessionList.appendChild(groupEl);
  });
}

// ─── Settings Modal ───────────────────────────────────────
document.getElementById('settings-btn').onclick = () => {
  document.getElementById('api-key-input').value = CONFIG.apiKey;
  document.getElementById('ai-provider').value = CONFIG.provider;
  document.getElementById('settings-modal').style.display = 'flex';
};
document.getElementById('settings-cancel').onclick = () => {
  document.getElementById('settings-modal').style.display = 'none';
};
document.getElementById('settings-save').onclick = () => {
  CONFIG.apiKey = document.getElementById('api-key-input').value.trim();
  CONFIG.provider = document.getElementById('ai-provider').value;
  localStorage.setItem('cbt_api_key', CONFIG.apiKey);
  localStorage.setItem('cbt_provider', CONFIG.provider);
  document.getElementById('settings-modal').style.display = 'none';
};
document.getElementById('settings-modal').onclick = (e) => {
  if (e.target === document.getElementById('settings-modal'))
    document.getElementById('settings-modal').style.display = 'none';
};

// ─── Pause Session ───────────────────────────────────────
function pauseSession() {
  if (!session.event || stage < 1) return;
  sessionToken++; // abort any in-flight async flows
  sendBtn.onclick = null;
  userInput.onkeydown = null;
  const stageNames = {
    0: 'Event', 1: 'Thoughts', 2: 'Belief Rating', 3: 'Distortions',
    4: 'Positive Reframing', 5: 'Choose Technique', 6: 'Rational Response', 7: 'Final Belief'
  };
  const snapshot = {
    ...session,
    stage,
    stageName: stageNames[stage] || ('Stage ' + stage),
    paused: true,
    ts: Date.now(),
  };
  const saved = JSON.parse(localStorage.getItem('cbt_sessions') || '[]');
  // Remove any existing paused entry for the same thought/event
  const filtered = saved.filter(s => !(s.paused && s.event === session.event && s.thought === session.thought));
  filtered.unshift(snapshot);
  localStorage.setItem('cbt_sessions', JSON.stringify(filtered.slice(0, 50)));
  renderSessionList();
  // Show confirmation in chat
  botBubble('⏸ Session paused and saved. You can resume it anytime from your History.', false);
  // Hide pause button and go to idle state
  document.getElementById('pause-session-btn').style.display = 'none';
  setInputDisabled(true);
  userInput.placeholder = 'Session paused. Resume from History or start a new session.';
}

// ─── Resume Session ───────────────────────────────────────
async function resumeSession(idx) {
  const saved = JSON.parse(localStorage.getItem('cbt_sessions') || '[]');
  const snap = saved[idx];
  if (!snap) return;

  // Remove from saved list (will be re-saved when session completes/pauses again)
  saved.splice(idx, 1);
  localStorage.setItem('cbt_sessions', JSON.stringify(saved));
  renderSessionList();

  // Restore session state
  sessionToken++; // abort any lingering async flows
  sendBtn.onclick = null;
  userInput.onkeydown = null;
  session = { ...snap };
  session.techniques = session.techniques || [];
  session.techniqueResults = session.techniqueResults || {};
  delete session.paused;
  delete session.stage;
  delete session.stageName;
  delete session.ts;

  const resumeStage = snap.stage || 1;
  const stageNames = {
    0: 'Event', 1: 'Thoughts', 2: 'Belief Rating', 3: 'Distortions',
    4: 'Positive Reframing', 5: 'Choose Technique', 6: 'Rational Response', 7: 'Final Belief'
  };

  // Reset UI
  messagesEl.innerHTML = '';
  userInput.value = '';
  const banner = document.getElementById('thought-banner');
  if (banner) banner.style.display = 'none';
  document.getElementById('switch-thought-btn').style.display = 'none';
  updatePips();

  await botBubble('Welcome back. Resuming your session for:<br><em style="color:var(--danger)">"' + escHtml(session.thought || session.event || '') + '"</em>');

  if (session.initialBelief != null) {
    showThoughtBanner();
    await botBubble('When you paused, you were at: <strong style="color:var(--accent)">' + (stageNames[resumeStage] || 'Stage ' + resumeStage) + '</strong>.<br><br>Initial belief: <strong>' + session.initialBelief + '%</strong>. Let\'s continue from where you left off.');
  }

  // Re-run from the paused stage
  runStage(resumeStage);
}

// ─── New Session ──────────────────────────────────────────
function startNewSession() {
  sessionToken++; // abort any lingering async flows
  sendBtn.onclick = null;
  userInput.onkeydown = null;
  session = {};
  stage = -1;
  messagesEl.innerHTML = '';
  userInput.value = '';
  const banner = document.getElementById('thought-banner');
  if (banner) banner.style.display = 'none';
  updatePips();
  runStage(0);
}

document.getElementById('new-session-btn').onclick = startNewSession;
document.getElementById('pause-session-btn').addEventListener('click', pauseSession);
document.getElementById('switch-thought-btn').addEventListener('click', openSwitchThoughtModal);

// ─── Sidebar Toggle ────────────────────────────────────────
document.getElementById('toggle-sidebar').onclick = () => {
  const sidebar = document.getElementById('sidebar');
  if (window.matchMedia('(max-width: 640px)').matches) {
    const isOpen = sidebar.classList.contains('open');
    sidebar.classList.toggle('open', !isOpen);
    document.body.classList.toggle('sidebar-open', !isOpen);
  } else {
    sidebar.classList.toggle('collapsed');
  }
};
document.getElementById('sidebar-overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.body.classList.remove('sidebar-open');
});

// ─── Clear History ─────────────────────────────────────────
document.getElementById('clear-history').onclick = () => {
  if (confirm('Clear all session history?')) {
    localStorage.removeItem('cbt_sessions');
    renderSessionList();
  }
};

// ─── Init ─────────────────────────────────────────────────
renderSessionList();
startNewSession();
</script>

          .catch(err => console.warn('SW registration failed:', err));
      });
    }
