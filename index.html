<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com; img-src 'self' data:; frame-src 'none'; object-src 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TEAM · CBT Companion</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0f14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TEAM CBT">
  <link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ─── Design Tokens ─────────────────────────────────── */
  :root {
    --bg:       #0d0f14;
    --surface:  #13161e;
    --card:     #1a1e29;
    --border:   #252a38;
    --accent:   #7fd8be;
    --accent2:  #5bb8f5;
    --muted:    #8892a4;
    --text:     #e8ecf4;
    --bot-bg:   #1a1e29;
    --user-bg:  #1e3a50;
    --danger:   #f87171;
    --gold:     #f5c842;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: .6;
  }

  /* ─── Header ────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    letter-spacing: 0.05em;
    color: var(--accent);
  }
  .logo span { color: var(--muted); font-style: italic; font-size: .85rem; margin-left: .5rem; }
  .header-actions { display: flex; gap: .75rem; align-items: center; }

  /* ─── Layout ─────────────────────────────────────────── */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Sidebar ─────────────────────────────────────────── */
  #sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width .3s ease;
    flex-shrink: 0;
  }
  #sidebar.collapsed { width: 0; }
  .sidebar-header {
    padding: .875rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: .7rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .session-list { flex: 1; overflow-y: auto; }
  /* ── Session group (event header + collapsible thoughts) ── */
  .sg-group { border-bottom: 1px solid var(--border); }
  .sg-header {
    display: flex; align-items: center; gap: .4rem;
    padding: .65rem 1rem; cursor: pointer;
    transition: background .15s; user-select: none;
  }
  .sg-header:hover { background: var(--card); }
  .sg-chevron {
    font-size: .6rem; color: var(--muted); flex-shrink: 0;
    transition: transform .2s; line-height: 1;
  }
  .sg-group.open .sg-chevron { transform: rotate(90deg); }
  .sg-event {
    font-size: .78rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .sg-count {
    font-size: .62rem; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 1px 7px; flex-shrink: 0;
  }
  .sg-date { font-size: .62rem; color: var(--muted); flex-shrink: 0; }
  .sg-thoughts { display: none; }
  .sg-group.open .sg-thoughts { display: block; }
  /* individual thought row inside group */
  .session-item {
    padding: .5rem 1rem .5rem 2rem;
    border-top: 1px solid var(--border);
    transition: background .15s; cursor: default;
  }
  .session-item:hover { background: var(--card); }
  .session-item .s-event {
    font-size: .78rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-style: italic;
  }
  .session-item .s-meta { font-size: .63rem; color: var(--muted); margin-top: .15rem; }
  .session-item .s-delta { font-size: .68rem; font-weight: 600; margin-top: .2rem; }
  .delta-pos { color: #4ade80; }
  .delta-neg { color: var(--danger); }
  .s-status-paused { font-size:.65rem; color: var(--accent2); background: rgba(127,216,190,.12); border:1px solid rgba(127,216,190,.25); border-radius:20px; padding:1px 7px; display:inline-block; margin-top:.25rem; }
  .s-status-done { font-size:.65rem; color: #4ade80; background: rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.25); border-radius:20px; padding:1px 7px; display:inline-block; margin-top:.25rem; }
  .s-resume-btn { display:block; margin-top:.4rem; width:100%; padding:.3rem .5rem; background:rgba(127,216,190,.1); border:1px solid rgba(127,216,190,.3); border-radius:7px; color:var(--accent); font-size:.72rem; font-family:'Sora',sans-serif; cursor:pointer; }
  .s-resume-btn:hover { background:rgba(127,216,190,.18); }
  .belief-reduction-callout { background:rgba(74,222,128,.08); border:1px solid rgba(74,222,128,.3); border-radius:12px; padding:.875rem 1rem; margin-top:.75rem; display:flex; flex-direction:column; align-items:center; gap:.25rem; }
  .brc-label { font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .brc-numbers { font-size:1.6rem; font-weight:700; color:#4ade80; font-family:'Playfair Display',serif; }
  .brc-sub { font-size:.72rem; color:var(--muted); }
  .empty-sessions {
    padding: 2rem 1rem;
    text-align: center;
    color: var(--muted);
    font-size: .78rem;
    line-height: 1.7;
  }

  /* ─── Chat Panel ─────────────────────────────────────── */
  #chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1.25rem 1rem;
    display: flex;
    flex-direction: column;
    gap: .875rem;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ─── Bubbles ──────────────────────────────────────── */
  .bubble-row {
    display: flex;
    gap: .625rem;
    align-items: flex-end;
    animation: bubbleIn .35s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(12px) scale(.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .bubble-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .8rem;
    flex-shrink: 0;
  }
  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0d0f14;
    font-weight: 600;
    font-family: 'Playfair Display', serif;
  }
  .avatar.user { background: var(--user-bg); color: var(--accent2); }

  .bubble {
    max-width: min(480px, 72%);
    padding: .75rem 1rem;
    border-radius: 16px;
    line-height: 1.65;
    font-size: .855rem;
    position: relative;
  }
  .bubble.bot {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .bubble.user {
    background: var(--user-bg);
    border: 1px solid #2a4a68;
    border-bottom-right-radius: 4px;
    color: #c8e8ff;
  }
  .bubble .typing-dots { display: inline-flex; gap: 4px; align-items: center; height: 18px; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100% { opacity: .3; transform: scale(.8); } 40% { opacity:1; transform: scale(1); } }


  /* ─── Sticky Thought Banner ──────────────────────────── */
  #thought-banner {
    display: none;
    align-items: center;
    gap: .625rem;
    padding: .5rem 1.25rem;
    background: rgba(26,30,41,.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
    flex-shrink: 0;
    animation: slideDown .3s ease;
  }
  @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  #thought-banner .tb-label {
    font-size: .63rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  #thought-banner .tb-thought {
    font-size: .82rem;
    color: var(--danger);
    font-style: italic;
    font-family: 'Playfair Display', serif;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #thought-banner .tb-belief {
    font-size: .72rem;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
  }
  #switch-thought-btn {
    flex-shrink: 0;
    font-size: .68rem;
    color: var(--accent);
    background: rgba(127,216,190,.08);
    border: 1px solid rgba(127,216,190,.25);
    border-radius: 20px;
    padding: 2px 10px;
    cursor: pointer;
    white-space: nowrap;
    display: none;
  }
  #switch-thought-btn:hover { background: rgba(127,216,190,.16); }
  .switch-thought-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
    display: flex; align-items: center; justify-content: center;
  }
  .switch-thought-panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 1.25rem; max-width: 380px; width: 90%; max-height: 80vh; overflow-y: auto;
  }
  .switch-thought-title {
    font-size: .9rem; font-weight: 600; color: var(--text); margin-bottom: .25rem;
  }
  .switch-thought-sub {
    font-size: .75rem; color: var(--muted); margin-bottom: .875rem; line-height: 1.5;
  }
  .switch-thought-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
    padding: .625rem .875rem; margin-bottom: .4rem; cursor: pointer;
    font-size: .82rem; color: var(--text); line-height: 1.5; font-style: italic;
    transition: border-color .15s;
  }
  .switch-thought-item:hover { border-color: var(--accent); color: var(--accent); }
  .switch-thought-cancel {
    width: 100%; margin-top: .625rem; padding: .5rem; background: none;
    border: 1px solid var(--border); border-radius: 9px; color: var(--muted);
    font-size: .78rem; cursor: pointer;
  }


  /* ─── Externalization of Voices ─────────────────────── */
  .ev-disclaimer { background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.3); border-radius:14px; padding:1rem 1.125rem; margin-bottom:.75rem; }
  .ev-disclaimer-title { font-size:.85rem; font-weight:700; color:#f59e0b; margin-bottom:.4rem; }
  .ev-disclaimer-body { font-size:.78rem; color:var(--muted); line-height:1.65; }
  .ev-export-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.875rem; margin-top:.75rem; }
  .ev-export-label { font-size:.68rem; text-transform:uppercase; letter-spacing:.08em; color:var(--accent); margin-bottom:.4rem; font-weight:600; }
  .ev-export-textarea { width:100%; background:#0d0f14; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:'Sora',sans-serif; font-size:.72rem; padding:.625rem; line-height:1.6; resize:vertical; min-height:100px; box-sizing:border-box; }
  .ev-copy-btn { margin-top:.4rem; width:100%; padding:.45rem; background:rgba(127,216,190,.1); border:1px solid rgba(127,216,190,.3); border-radius:8px; color:var(--accent); font-size:.76rem; font-family:'Sora',sans-serif; cursor:pointer; transition:background .15s; }
  .ev-copy-btn:hover { background:rgba(127,216,190,.2); }
  .ev-copy-btn.copied { background:rgba(74,222,128,.15); border-color:rgba(74,222,128,.4); color:#4ade80; }
  .ev-phase-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:.625rem; display:flex; align-items:center; gap:.4rem; }
  .ev-phase-label::before { content:''; display:block; width:20px; height:1px; background:var(--border); }
  .ev-attack-bubble { background:rgba(248,113,113,.08); border:1px solid rgba(248,113,113,.25); border-radius:12px 12px 12px 4px; padding:.75rem 1rem; margin:.375rem 0; }
  .ev-attack-label { font-size:.62rem; letter-spacing:.09em; text-transform:uppercase; color:var(--danger); margin-bottom:.3rem; font-weight:600; }
  .ev-attack-text { font-size:.88rem; color:var(--text); font-style:italic; font-family:'Playfair Display',serif; line-height:1.5; }
  .ev-defense-area { margin-top:.625rem; }
  .ev-defense-ta { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'Sora',sans-serif; font-size:.82rem; padding:.625rem .875rem; line-height:1.6; resize:none; box-sizing:border-box; min-height:70px; }
  .ev-defense-ta:focus { outline:none; border-color:var(--accent); }
  .ev-submit-defense { margin-top:.4rem; width:100%; padding:.5rem; background:var(--accent); border:none; border-radius:8px; color:#0d0f14; font-family:'Sora',sans-serif; font-size:.8rem; font-weight:700; cursor:pointer; }
  .ev-submit-defense:hover { opacity:.88; }
  .win-meter { display:flex; gap:.3rem; margin:.5rem 0; }
  .win-dot { flex:1; padding:.3rem; border-radius:7px; text-align:center; font-size:.68rem; font-weight:600; letter-spacing:.04em; border:1px solid var(--border); color:var(--muted); transition:all .3s; }
  .win-dot.small { background:rgba(248,113,113,.2); border-color:rgba(248,113,113,.5); color:var(--danger); }
  .win-dot.big { background:rgba(245,158,11,.2); border-color:rgba(245,158,11,.5); color:#f59e0b; }
  .win-dot.huge { background:rgba(74,222,128,.2); border-color:rgba(74,222,128,.5); color:#4ade80; }
  .ev-feedback { font-size:.78rem; color:var(--muted); line-height:1.55; margin:.375rem 0; padding:.5rem .75rem; background:var(--surface); border-radius:8px; border-left:2px solid var(--accent); }
  .ev-model-bubble { background:rgba(127,216,190,.07); border:1px solid rgba(127,216,190,.25); border-radius:4px 12px 12px 12px; padding:.75rem 1rem; margin:.375rem 0; }
  .ev-model-label { font-size:.62rem; letter-spacing:.09em; text-transform:uppercase; color:var(--accent); margin-bottom:.3rem; font-weight:600; }
  .ev-model-text { font-size:.85rem; color:var(--text); line-height:1.55; }


  /* ─── Session Review Modal ───────────────────────────── */
  .review-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300;
    display:flex; align-items:center; justify-content:center; padding:1rem;
  }
  .review-panel {
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    padding:0; max-width:480px; width:100%; max-height:88vh;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .review-header {
    padding:1rem 1.25rem .75rem; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
  }
  .review-title { font-size:.95rem; font-weight:700; color:var(--text); font-family:'Playfair Display',serif; }
  .review-close { background:none; border:none; color:var(--muted); font-size:1.1rem; cursor:pointer; padding:.2rem .4rem; border-radius:6px; }
  .review-close:hover { color:var(--text); background:var(--surface); }
  .review-body { overflow-y:auto; padding:1rem 1.25rem; flex:1; }
  .review-section { margin-bottom:1rem; }
  .review-section-label {
    font-size:.62rem; letter-spacing:.1em; text-transform:uppercase;
    color:var(--accent); margin-bottom:.4rem; font-weight:600;
  }
  .review-section-value {
    font-size:.82rem; color:var(--text); line-height:1.6;
    background:var(--surface); border:1px solid var(--border);
    border-radius:9px; padding:.625rem .875rem;
  }
  .review-belief-bar {
    display:flex; align-items:center; gap:.75rem; padding:.625rem .875rem;
    background:var(--surface); border:1px solid var(--border); border-radius:9px;
  }
  .review-belief-from { font-size:1.1rem; color:var(--danger); font-weight:700; }
  .review-belief-to { font-size:1.1rem; color:#4ade80; font-weight:700; }
  .review-belief-arrow { color:var(--muted); font-size:.9rem; }
  .review-belief-drop { font-size:.75rem; font-weight:700; margin-left:auto; }
  .review-technique-item {
    background:var(--surface); border:1px solid var(--border); border-radius:9px;
    padding:.5rem .875rem; margin-bottom:.375rem; font-size:.78rem; color:var(--text); line-height:1.55;
  }
  .review-technique-name { font-size:.68rem; color:var(--accent2); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.2rem; font-weight:600; }


  /* ─── Hauck 4 Options ───────────────────────────────────── */
  .h4o-card {
    padding: .65rem .875rem; border-radius: 10px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface);
    transition: border-color .15s, background .15s;
    display: flex; flex-direction: column; gap: .2rem;
  }
  .h4o-card:hover { border-color: var(--accent2); }
  .h4o-card.selected { border-color: var(--accent); background: rgba(127,216,190,.08); }
  .h4o-card.warn.selected { border-color: var(--danger); background: rgba(248,113,113,.07); }
  .h4o-name { font-size: .82rem; font-weight: 600; color: var(--text); }
  .h4o-desc { font-size: .73rem; color: var(--muted); line-height: 1.5; }
  .h4o-warn { font-size: .68rem; color: var(--danger); margin-top: .15rem; }

  /* ─── Stage Widgets ──────────────────────────────────── */
  .widget {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.25rem;
    margin-top: .5rem;
    max-width: 520px;
    animation: bubbleIn .4s cubic-bezier(.34,1.56,.64,1) both;
    animation-delay: .15s;
  }

  .widget-label {
    font-size: .68rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .625rem;
    font-weight: 500;
  }

  /* Textarea */
  .chat-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: .855rem;
    padding: .75rem 1rem;
    resize: none;
    transition: border-color .2s;
    line-height: 1.6;
  }
  .chat-textarea:focus { outline: none; border-color: var(--accent); }
  .chat-textarea::placeholder { color: var(--muted); }

  /* Submit button */
  .btn-submit {
    margin-top: .625rem;
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: .55rem 1.25rem;
    font-family: 'Sora', sans-serif;
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    letter-spacing: .04em;
  }
  .btn-submit:hover { opacity: .85; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

  /* Slider */
  .belief-slider-wrap { margin-top: .25rem; }
  .belief-slider-row { display: flex; align-items: center; gap: .875rem; }
  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 5px;
    border-radius: 5px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(127,216,190,.15);
    cursor: pointer;
    transition: box-shadow .2s;
  }

  /* Progress bar */
  .stage-bar {

  /* Bottom bar */
  #bottom-bar {

  #send-btn {

  /* New session btn */
  .btn-ghost {

    border-radius: 8px;
    padding: .4rem .875rem;
    font-family: 'Sora', sans-serif;
    font-size: .75rem;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* Summary card */
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    max-width: 520px;
    margin-top: .5rem;
    animation: bubbleIn .4s ease both;
  }
  .summary-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--gold);
    margin-bottom: .875rem;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .4rem 0;
    border-bottom: 1px solid var(--border);
    font-size: .8rem;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .label { color: var(--muted); }
  .summary-row .value { color: var(--text); font-weight: 500; max-width: 260px; text-align: right; }
  .belief-change {
    text-align: center;
    margin: 1rem 0 .5rem;
    font-family: 'Playfair Display', serif;
  }
  .belief-change .from { font-size: 2rem; color: var(--danger); }
  .belief-change .arrow { font-size: 1.25rem; color: var(--muted); margin: 0 .5rem; }
  .belief-change .to { font-size: 2rem; color: #4ade80; }
  .belief-change .drop {
    font-size: .78rem;
    color: var(--muted);
    font-family: 'Sora', sans-serif;
    margin-top: .25rem;
  }

  /* Settings modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 100;

    align-items: center;
    justify-content: center;

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    width: min(420px, 90vw);
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 1.25rem;
  }
  .form-group { margin-bottom: 1rem; }
  .form-label {

    text-transform: uppercase;

  }
  .form-input {
    width: 100%;
    background: var(--surface);

  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-select {
    width: 100%;

    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);

  .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.25rem; }

  /* Scrollbar */
  .session-list::-webkit-scrollbar { width: 3px; }
  .session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }


  /* ─── Technique Picker ───────────────────────────────── */
  .technique-cards {
    display: flex;
    flex-direction: column;
    gap: .625rem;
    margin-top: .5rem;
  }
  .technique-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .875rem 1rem;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
    width: 100%;
  }
  .technique-card:hover { border-color: var(--accent2); background: var(--card); }
  .technique-card .tc-name {
    font-size: .88rem;
    font-weight: 600;
    color: var(--accent2);
    font-family: 'Playfair Display', serif;
    display: block;
    margin-bottom: .3rem;
  }
  .technique-card .tc-desc {
    font-size: .76rem;
    color: var(--muted);
    line-height: 1.5;
    display: block;
  }

  /* ─── CBA / Evidence Table ───────────────────────────── */
  .two-col-table { width: 100%; border-collapse: collapse; margin: .625rem 0; }
  .two-col-table th {
    padding: .5rem .75rem;
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 500;

  .two-col-table th.pros { color: #4ade80; text-align: left; width: 50%; }
  .two-col-table th.cons { color: var(--danger); text-align: left; width: 50%; border-left: 1px solid var(--border); padding-left: .875rem; }
  .two-col-table td {
    vertical-align: top;
    padding: .5rem .75rem;
    width: 50%;
  }
  .two-col-table td.cons-cell { border-left: 1px solid var(--border); padding-left: .875rem; }
  .two-col-table td textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: .8rem;
    padding: .5rem .75rem;
    resize: vertical;
    min-height: 90px;
    line-height: 1.6;
    transition: border-color .2s;
  }
  .two-col-table td textarea:focus { outline: none; border-color: var(--accent); }
  .two-col-table td textarea::placeholder { color: var(--muted); }

  /* balance slider */
  .balance-row {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: .625rem .75rem;
    background: var(--surface);
    border-radius: 8px;
    margin-top: .5rem;
  }
  .balance-label { font-size: .72rem; color: var(--muted); white-space: nowrap; }
  .balance-val { font-size: .88rem; font-weight: 600; color: var(--accent); min-width: 42px; text-align: center; }

  /* technique nav buttons */
  .technique-nav {
    display: flex;
    gap: .625rem;
    margin-top: .875rem;
    flex-wrap: wrap;
  }
  .btn-another {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    border-radius: 8px;
    padding: .5rem 1rem;
    font-family: 'Sora', sans-serif;
    font-size: .78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;

  .btn-another:hover { background: rgba(91,184,245,.1); }
  .btn-proceed {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: .5rem 1.125rem;
    color: #0d0f14;
    font-family: 'Sora', sans-serif;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-proceed:hover { opacity: .85; }


  /* ─── Row-based list inputs ──────────────────────────── */
  .list-col { display: flex; flex-direction: column; gap: .375rem; }
  .list-col-header {
    font-size: .7rem; letter-spacing: .08em; text-transform: uppercase;
    font-weight: 500; padding: .4rem .5rem .3rem; border-bottom: 1px solid var(--border);
    margin-bottom: .1rem;
  }
  .list-col-header.for-col { color: #4ade80; }
  .list-col-header.against-col { color: var(--danger); }
  .list-col-header.pros-col { color: #4ade80; }
  .list-col-header.cons-col { color: var(--danger); }
  .list-row-item {
    display: flex; align-items: center; gap: .375rem;
  }
  .list-row-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);

    font-size: .8rem;
    padding: .45rem .7rem;
    transition: border-color .2s;
    line-height: 1.4;
  }
  .list-row-input:focus { outline: none; border-color: var(--accent); }
  .list-row-input::placeholder { color: var(--muted); }
  .list-row-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 1rem; line-height: 1; padding: .2rem .35rem; border-radius: 5px;

  }
  .list-row-del:hover { color: var(--danger); background: rgba(248,113,113,.1); }
  .add-row-btn {

    border: 1px dashed var(--border);

    padding: .35rem .75rem;
    font-family: 'Sora', sans-serif;

  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }
  .two-col-lists {

  /* ─── Inline therapist button (compact) ─────────────── */
  .btn-therapist-sm {

    border: 1px solid #5b4fa0;

    margin-top: .5rem;
    font-size: .82rem;
    line-height: 1.7;

  @media (max-width: 640px) {

    .bubble { max-width: min(300px, 88%); font-size: .82rem; padding: .65rem .875rem; }

      <input class="form-input" type="password" id="api-key-input" placeholder="sk-ant-… or sk-… or AIza…" />
    </div>
    <div class="form-group">
      <label class="form-label">AI Provider</label>
      <select class="form-select" id="ai-provider">
        <option value="claude">Anthropic (Claude)</option>
        <option value="openai">OpenAI (GPT-4o)</option>
        <option value="gemini">Google (Gemini)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="settings-cancel">Cancel</button>
      <button class="btn-submit" id="settings-save">Save</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
//  CONFIG  (edit these or use the Settings modal)
// ─────────────────────────────────────────────────────────
let CONFIG = {
  apiKey:   localStorage.getItem('cbt_api_key') || '',
  provider: localStorage.getItem('cbt_provider') || 'claude',
};

const SYSTEM_PROMPT = `You are a TEAM-CBT therapist using David Burns' method. The user has already identified their distortions — do NOT repeat them back or explain what they are. Skip the analysis. Go straight to action.

YOUR RESPONSE MUST FOLLOW THIS EXACT FORMAT — three short paragraphs, no headers:

Paragraph 1 — Name one Burns technique and give the user a SPECIFIC, CONCRETE instruction for how to apply it to their exact negative thought right now. Not a description of the technique — a direct command. Example: "Try the Double Standard technique: write down exactly what you would say to a close friend who told you they felt this way after [their specific event]."

Paragraph 2 — Ask ONE sharp Socratic question that directly attacks the logical flaw in their specific thought. The question must reference their exact words. It should be impossible to answer with "yes" or "no". Example: "When you say you 'can't do anything', what is one thing — even something small — that you did manage to do today or yesterday?"

Paragraph 3 — Give a single sentence starter they can use to begin writing their Rational Response right now. Format: 'Start your response with: "Even though [X], the truth is that..."'

RULES:
- Never explain what a distortion is — the user already knows.
- Never be vague. Every sentence must be actionable and tied to their specific thought and event.
- Never write the Rational Response for them.
- Maximum 5 sentences total across all three paragraphs.
- Tone: direct, warm, like a skilled coach — not a textbook.
- HARD LIMIT: Your entire response must be under 120 words. Count carefully. Stop before you hit the limit — never mid-sentence.`;

const DISTORTIONS = [
  { id: 'aot', name: 'All-or-Nothing', desc: 'Black & white thinking' },
  { id: 'ovr', name: 'Overgeneralization', desc: '"Always" / "Never"' },
  { id: 'mfm', name: 'Mental Filter', desc: 'Focusing on negatives' },
  { id: 'dtp', name: 'Discounting +', desc: 'Rejecting positives' },
  { id: 'jmc', name: 'Mind-Reading', desc: 'Assuming others\' thoughts' },
  { id: 'ftl', name: 'Fortune-Telling', desc: 'Predicting the worst' },
  { id: 'mag', name: 'Magnification', desc: 'Blowing things up' },
  { id: 'efr', name: 'Emotional Reasoning', desc: 'Feelings = facts' },
  { id: 'shs', name: 'Should Statements', desc: '"I should/must/ought to"' },
  { id: 'lbl', name: 'Labeling', desc: '"I\'m a loser/failure"' },
];

// ─── Session State ──────────────────────────────────────
let session = {};
let sessionToken = 0; // incremented on every thought reset; async flows abort if token changes
let stage = -1; // -1 = not started

// ─── DOM Refs ───────────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const userInput   = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');
const sessionList = document.getElementById('session-list');

// ─── Helpers ────────────────────────────────────────────
function scrollBottom() {
  setTimeout(() => messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' }), 60);
}

function updatePips() {
  for (let i = 0; i < 8; i++) {
    const pip = document.getElementById(`pip-${i}`);
    pip.className = 'stage-pip' + (i < stage ? ' done' : i === stage ? ' active' : '');
  }
}

function showThoughtBanner() {
  const banner = document.getElementById('thought-banner');
  banner.style.display = 'flex';
  document.getElementById('tb-thought-text').textContent = '"' + session.thought + '"';
  document.getElementById('tb-belief-text').textContent = 'Initial: ' + session.initialBelief + '%';
  const switchBtn = document.getElementById('switch-thought-btn');
  const others = (session.thoughts || []).filter(t => t !== session.thought);
  switchBtn.style.display = others.length > 0 ? 'block' : 'none';
}

function openSwitchThoughtModal() {
  const others = (session.thoughts || []).filter(t => t !== session.thought);
  if (!others.length) return;

  const overlay = document.createElement('div');
  overlay.className = 'switch-thought-modal';
  overlay.innerHTML = '<div class="switch-thought-panel">'
    + '<div class="switch-thought-title">⇄ Switch to Another Thought</div>'
    + '<div class="switch-thought-sub">Your current thought will be paused. You can always come back — this session will be saved as-is.</div>'
    + others.map(t => { const w = (session.workedThoughts||[]).includes(t); return '<div class="switch-thought-item" data-thought="' + escHtml(t) + '" style="' + (w ? 'opacity:.4;border-style:dashed;cursor:pointer' : '') + '">"' + escHtml(t) + '"' + (w ? ' <span style="font-size:.62rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1px 6px;margin-left:.35rem">✓ worked</span>' : '') + '</div>'; }).join('')
    + '<button class="switch-thought-cancel">Stay with current thought</button>'
    + '</div>';

  overlay.querySelectorAll('.switch-thought-item').forEach(el => {
    el.addEventListener('click', () => {
      const newThought = el.dataset.thought;
      document.body.removeChild(overlay);
      // Save partial session before switching
      const savedSw = JSON.parse(localStorage.getItem('cbt_sessions') || '[]');
      savedSw.unshift({ ...session, ts: Date.now(), partial: true });
      localStorage.setItem('cbt_sessions', JSON.stringify(savedSw.slice(0, 50)));
      renderSessionList();
      const allThoughtsSw = session.thoughts || [];
      const prevWorkedSw = session.workedThoughts || [];
      if (session.thought && !prevWorkedSw.includes(session.thought)) prevWorkedSw.push(session.thought);
      resetForThought(newThought, allThoughtsSw, prevWorkedSw);
      botBubble('Switching to: <em>"' + escHtml(newThought) + '"</em><br><br>Starting fresh with this thought.').then(() => runStage(2));
    });
  });

  overlay.querySelector('.switch-thought-cancel').addEventListener('click', () => {
    document.body.removeChild(overlay);
  });

  document.body.appendChild(overlay);
}

function formatDate(ts) {
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// ─── Bubble builders ─────────────────────────────────────
function botBubble(html, addTyping = true) {
  return new Promise(resolve => {
    if (addTyping) {
      const row = document.createElement('div');
      row.className = 'bubble-row';
      row.innerHTML = `
        <div class="avatar bot">B</div>
        <div class="bubble bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      messagesEl.appendChild(row);
      scrollBottom();
      setTimeout(() => {
        row.querySelector('.bubble').innerHTML = html;
        scrollBottom();
        resolve(row);
      }, 700 + Math.random() * 400);
    } else {
      const row = document.createElement('div');
      row.className = 'bubble-row';
      row.innerHTML = `<div class="avatar bot">B</div><div class="bubble bot">${html}</div>`;
      messagesEl.appendChild(row);
      scrollBottom();
      resolve(row);
    }
  });
}

function userBubble(text) {
  const row = document.createElement('div');
  row.className = 'bubble-row user';
  row.innerHTML = `<div class="avatar user">U</div><div class="bubble user">${escHtml(text)}</div>`;
  messagesEl.appendChild(row);
  scrollBottom();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendWidget(html) {
  const w = document.createElement('div');
  w.className = 'widget';
  w.innerHTML = html;
  messagesEl.appendChild(w);
  scrollBottom();
  return w;
}

// ─── Belief Slider Widget ────────────────────────────────
function buildSliderWidget(label, btnLabel, onSubmit) {
  const w = appendWidget(`
    <div class="widget-label">${label}</div>
    <div class="belief-slider-wrap">
      <div class="belief-slider-row">
        <input type="range" min="0" max="100" value="70" id="belief-range" />
        <div class="slider-val" id="belief-display">70%</div>
      </div>
    </div>
    <button class="btn-submit" id="belief-btn" style="margin-top:.875rem">${btnLabel}</button>
  `);
  const range = w.querySelector('#belief-range');
  const disp  = w.querySelector('#belief-display');
  range.addEventListener('input', () => disp.textContent = range.value + '%');
  w.querySelector('#belief-btn').addEventListener('click', () => {
    const val = parseInt(range.value);
    w.style.opacity = '.5';
    w.style.pointerEvents = 'none';
    onSubmit(val);

// ─── Distortions Widget ──────────────────────────────────
function buildDistortionsWidget(onSubmit) {
  const selected = new Set();
  const btns = DISTORTIONS.map(d =>
    `<button class="distortion-btn" data-id="${d.id}">
       <span class="d-name">${d.name}</span>
       <span class="d-desc">${d.desc}</span>
     </button>`
  ).join('');
  const w = appendWidget(`
    <div class="widget-label">Cognitive Distortions · Select all that apply</div>
    <div class="distortions-grid">${btns}</div>
    <button class="btn-submit" id="distortion-confirm" style="margin-top:.875rem" disabled>Confirm Selection</button>
  `);

  w.querySelectorAll('.distortion-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      if (selected.has(id)) { selected.delete(id); btn.classList.remove('selected'); }
      else { selected.add(id); btn.classList.add('selected'); }
      w.querySelector('#distortion-confirm').disabled = selected.size === 0;
    });
  });

  w.querySelector('#distortion-confirm').addEventListener('click', () => {
    const names = DISTORTIONS.filter(d => selected.has(d.id)).map(d => d.name);
    w.style.opacity = '.5';
    w.style.pointerEvents = 'none';
    onSubmit(names);
  });

  attachTherapist(w, 'distortions', () => 'Distortions selected so far: ' + (Array.from(selected).map(id => DISTORTIONS.find(d=>d.id===id)?.name).join(', ') || 'none yet'));
}

// ─── Textarea Widget ────────────────────────────────────
function buildTextareaWidget(label, placeholder, btnLabel, onSubmit) {
  const w = appendWidget(`
    <div class="widget-label">${label}</div>
    <textarea class="chat-textarea" rows="4" placeholder="${placeholder}" id="ta-widget"></textarea>
    <div style="display:flex;gap:.625rem;align-items:center;margin-top:.625rem;flex-wrap:wrap">
      <button class="btn-submit" id="ta-btn">${btnLabel}</button>
      <button class="btn-therapist" id="ta-therapist">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Call Therapist
      </button>
    </div>
    <div id="ai-resp-container"></div>
  `);

  const ta = w.querySelector('#ta-widget');
  w.querySelector('#ta-btn').addEventListener('click', () => {
    const val = ta.value.trim();
    if (!val) { ta.style.borderColor='var(--danger)'; setTimeout(()=>ta.style.borderColor='',800); return; }
    w.style.opacity = '.5';
    w.style.pointerEvents = 'none';
    onSubmit(val);
  });

  w.querySelector('#ta-therapist').addEventListener('click', async () => {
    const container = w.querySelector('#ai-resp-container');
    container.innerHTML = `<div class="ai-response"><div class="ai-label">AI Therapist · thinking…</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    scrollBottom();
    try {
      const extra = 'What they have written so far: "' + (ta.value || 'nothing yet') + '"';
      const reply = await callAI(STEP_PROMPTS.rational, sessionContext() + '\n\n' + extra);
      container.innerHTML = `<div class="ai-response"><div class="ai-label">AI Therapist · Rational Response</div>${escHtml(reply).replace(/\n/g,'<br>')}</div>`;
    } catch(e) {
      container.innerHTML = `<div class="ai-response" style="border-color:var(--danger);color:var(--danger)">${escHtml(e.message)}</div>`;
    }
    scrollBottom();
  });
}

// ─── AI Call ─────────────────────────────────────────────
async function callAI(stepPrompt, userMsg) {
  if (!CONFIG.apiKey) throw new Error('No API key set. Open Settings to add one.');
  const { provider, apiKey } = CONFIG;

  if (provider === 'claude') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'content-type': 'application/json' },
      body: JSON.stringify({ model: 'claude-opus-4-6', max_tokens: 2048, system: stepPrompt, messages: [{ role:'user', content: userMsg }] })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.content[0].text;

  } else if (provider === 'openai') {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}`, 'content-type': 'application/json' },
      body: JSON.stringify({ model: 'gpt-4o', messages: [{ role:'system', content: stepPrompt },{ role:'user', content: userMsg }], max_tokens: 2048 })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.choices[0].message.content;

  } else if (provider === 'gemini') {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ systemInstruction: { parts: [{ text: stepPrompt }] }, contents: [{ role: 'user', parts: [{ text: userMsg }] }], generationConfig: { maxOutputTokens: 2048 } })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.candidates[0].content.parts[0].text;
  }
}

// ─── Base session context builder ────────────────────────
function sessionContext() {
  return [
    'Upsetting Event: ' + (session.event || '(not specified)'),
    'Negative Thought: "' + (session.thought || '') + '"',
    'Initial Belief: ' + (session.initialBelief ?? '?') + '%',
    session.distortions?.length ? 'Distortions identified: ' + session.distortions.join(', ') : '',
    session.reframing ? 'Positive Reframing written: "' + session.reframing + '"' : '',
  ].filter(Boolean).join('\n');
}

// ─── Per-step AI prompts ──────────────────────────────────
const STEP_PROMPTS = {

  distortions: `You are a TEAM-CBT assistant helping identify cognitive distortions.
The user has a negative thought and needs help identifying which of Burns' 10 distortions apply.

Max 3 suggestions. No preamble.`,

  cba_cons: `You are a TEAM-CBT assistant helping with Cost-Benefit Analysis.
The user is listing DISADVANTAGES of their negative thought — ways it hurts them.
YOUR JOB: Suggest 2-3 specific, plausible costs of holding this exact thought that the user may not have considered (e.g. "drains energy needed to act", "becomes a self-fulfilling prophecy").

  ete_for: `You are a TEAM-CBT assistant helping with Examine the Evidence.

  ete_against: `You are a TEAM-CBT assistant helping with Examine the Evidence.

YOUR JOB: Suggest 2-3 specific, concrete pieces of evidence AGAINST this thought the user may be overlooking — facts that challenge its truth.

  rational: `You are a TEAM-CBT assistant helping write a Rational Response (Paul Hauck + David Burns).

YOUR JOB: Suggest ONE complete Rational Response the user could adapt. It must be specific, time-bound, and behavior-focused — not a global statement about their worth or identity.

Max 80 words total.`,

  socratic: `You are a TEAM-CBT assistant for the Socratic Method step.
YOUR JOB: Suggest 2 sharp Socratic questions targeting their specific thought. Follow the logic until it hits a contradiction.
Format: "• [Question]" on its own line. Max 2. No preamble.`,

  shades: `You are a TEAM-CBT assistant for the Thinking in Shades of Gray step.

Format: 'Try: "[nuanced version]"' then one brief sentence explaining what it corrects. Max 50 words.`,

  define: `You are a TEAM-CBT assistant for the Let's Define Terms step.
YOUR JOB: Ask ONE sharp question exposing why this label cannot be literally true of any whole person. Then suggest naming the specific behavior instead of the whole identity. Max 60 words.`,

  sfc: `You are a TEAM-CBT assistant for the Self-Forgiveness Check (Paul Hauck's technique).
