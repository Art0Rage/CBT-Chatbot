// ─── Reusable therapist button helper ────────────────────
function attachTherapist(widget, stepKey, extraContextFn) {
  const svgIcon = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
  const btn = document.createElement('button');
  btn.className = 'btn-therapist-sm';
  btn.innerHTML = svgIcon + ' Ask AI for suggestions';
  const respDiv = document.createElement('div');
  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.innerHTML = '…';
    respDiv.innerHTML = '<div class="ai-resp-inline"><div class="ai-label">AI · thinking</div><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    scrollBottom();
    try {
      const stepPrompt = STEP_PROMPTS[stepKey];
      if (!stepPrompt) throw new Error('Unknown step: ' + stepKey);
      const extra = typeof extraContextFn === 'function' ? extraContextFn() : (extraContextFn || '');
      const userMsg = sessionContext() + (extra ? '\n\n' + extra : '');
      const reply = await callAI(stepPrompt, userMsg);
      respDiv.innerHTML = '<div class="ai-resp-inline"><div class="ai-label">AI · ' + stepKey.replace('_',' ') + '</div>' + escHtml(reply).replace(/\n/g,'<br>') + '</div>';
    } catch(e) {
      respDiv.innerHTML = '<div class="ai-resp-inline" style="border-color:var(--danger);color:var(--danger)">' + escHtml(e.message) + '</div>';
    }
    btn.disabled = false;
    btn.innerHTML = svgIcon + ' Ask AI again';
    scrollBottom();
  });
  widget.appendChild(btn);
  widget.appendChild(respDiv);
}

// ─── Row-list builder helper ──────────────────────────────
function buildRowList(container, placeholders, colorClass) {
  function addRow(val) {
    const item = document.createElement('div');
    item.className = 'list-row-item';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'list-row-input';
    inp.placeholder = placeholders[Math.min(container.querySelectorAll('.list-row-item').length, placeholders.length-1)];
    inp.value = val || '';
    const del = document.createElement('button');
    del.className = 'list-row-del';
    del.innerHTML = '×';
    del.title = 'Remove';
    del.addEventListener('click', () => {
      item.remove();
      if (container.querySelectorAll('.list-row-item').length === 0) addRow('');
    });
    item.appendChild(inp);
    item.appendChild(del);
    container.insertBefore(item, container.querySelector('.add-row-btn'));
  }
  addRow('');
  const addBtn = document.createElement('button');
  addBtn.className = 'add-row-btn';
  addBtn.innerHTML = '+ Add row';
  addBtn.addEventListener('click', (e) => { e.preventDefault(); addRow(''); scrollBottom(); });
  container.appendChild(addBtn);
}

function getRowValues(container) {
  return Array.from(container.querySelectorAll('.list-row-input'))
    .map(i => i.value.trim()).filter(Boolean);
}


// ─── Technique Runner ─────────────────────────────────────
async function runTechnique(tid) {
  const myToken = sessionToken;
  if (!session.techniques) session.techniques = [];
  session.techniques.push(tid);
  if (!session.techniqueResults) session.techniqueResults = {};

  if (tid === 'cba') {
    await botBubble(`<strong style="color:var(--accent2)">Cost-Benefit Analysis</strong><br><br>
List every <strong style="color:#4ade80">advantage</strong> of believing this thought (how it helps or protects you), and every <strong style="color:var(--danger)">disadvantage</strong> (how it hurts you). Add as many rows as you need.<br><br>
Then drag the balance slider to reflect whether the costs or benefits are greater.`);

    const w = document.createElement('div');
    w.className = 'widget';
    w.innerHTML = `
      <div class="widget-label">Cost-Benefit Analysis</div>
      <div style="font-size:.75rem;color:var(--muted);margin-bottom:.625rem">Thought: <em style="color:var(--danger)">"${escHtml(session.thought)}"</em></div>
      <div class="two-col-lists">
        <div class="list-col" id="cba-pros-col">
          <div class="list-col-header pros-col">✓ Advantages / Benefits</div>
        </div>
        <div class="list-col" id="cba-cons-col">
          <div class="list-col-header cons-col">✗ Disadvantages / Costs</div>
        </div>
      </div>
      <div class="balance-row" style="margin-top:.75rem">
        <span class="balance-label" style="color:#4ade80">Benefits</span>
        <input type="range" min="0" max="100" value="50" id="cba-balance" style="flex:1;height:5px;border-radius:5px;outline:none;cursor:pointer;-webkit-appearance:none"/>
        <span class="balance-val" id="cba-bal-disp">50 / 50</span>
        <span class="balance-label" style="color:var(--danger)">Costs</span>
      </div>
      <div class="technique-nav" style="margin-top:.75rem">
        <button class="btn-proceed" id="cba-done">Save & Continue →</button>
      </div>
    `;
    messagesEl.appendChild(w);
    scrollBottom();

    buildRowList(w.querySelector('#cba-pros-col'), ['Keeps me motivated…', 'Protects me from…', 'Shows I care about…', 'Add another…'], 'pros');
    buildRowList(w.querySelector('#cba-cons-col'), ['Makes me feel hopeless…', 'Stops me from trying…', 'Hurts my confidence…', 'Add another…'], 'cons');

    const range = w.querySelector('#cba-balance');
    const disp  = w.querySelector('#cba-bal-disp');
    const updateSlider = () => {
      const v = parseInt(range.value);
      disp.textContent = v + ' / ' + (100-v);
      range.style.background = 'linear-gradient(to right, #4ade80 ' + v + '%, var(--danger) ' + v + '%)';
    };
    range.addEventListener('input', updateSlider);
    updateSlider();

    // Two separate AI buttons: one for pros, one for cons
    const cbaAiRow = document.createElement('div');
    cbaAiRow.style.cssText = 'display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem';
    w.appendChild(cbaAiRow);
    const prosAiDiv = document.createElement('div'); cbaAiRow.appendChild(prosAiDiv);
    const consAiDiv = document.createElement('div'); cbaAiRow.appendChild(consAiDiv);
    attachTherapist(prosAiDiv, 'cba_pros', () => 'Advantages listed so far: ' + (getRowValues(w.querySelector('#cba-pros-col')).join('; ') || 'none yet'));
    attachTherapist(consAiDiv, 'cba_cons', () => 'Costs listed so far: ' + (getRowValues(w.querySelector('#cba-cons-col')).join('; ') || 'none yet'));
    w.appendChild(document.createElement('div')); // spacer

    w.querySelector('#cba-done').addEventListener('click', () => {
      const pros = getRowValues(w.querySelector('#cba-pros-col'));
      const cons = getRowValues(w.querySelector('#cba-cons-col'));
      if (!pros.length && !cons.length) { return; }
      const bal = parseInt(range.value);
      session.techniqueResults.cba = { pros, cons, balance: bal + ' benefits / ' + (100-bal) + ' costs' };
      w.style.opacity = '.5';
      w.style.pointerEvents = 'none';
      userBubble('Benefits: ' + (pros.join(', ') || '—') + '\n\nCosts: ' + (cons.join(', ') || '—') + '\n\nBalance: ' + bal + ' / ' + (100-bal));
      afterTechnique();
    });

  } else if (tid === 'ete') {
    await botBubble(`<strong style="color:var(--accent2)">Examine the Evidence</strong><br><br>
Act like a detective. List the actual <strong style="color:#4ade80">facts that support</strong> your thought, and the <strong style="color:var(--danger)">facts that contradict</strong> it. One fact per row.<br><br>
Then drag the slider: does the evidence actually prove this thought is 100% true?`);

    const w = document.createElement('div');
    w.className = 'widget';
    w.innerHTML = `
      <div class="widget-label">Examine the Evidence</div>
      <div style="font-size:.75rem;color:var(--muted);margin-bottom:.625rem">Thought: <em style="color:var(--danger)">"${escHtml(session.thought)}"</em></div>
      <div class="two-col-lists">
        <div class="list-col" id="ete-for-col">
          <div class="list-col-header for-col">✓ Evidence FOR the thought</div>
        </div>
        <div class="list-col" id="ete-against-col">
          <div class="list-col-header against-col">✗ Evidence AGAINST the thought</div>
        </div>
      </div>
      <div class="balance-row" style="margin-top:.75rem">
        <span class="balance-label" style="color:#4ade80">Supports it</span>
        <input type="range" min="0" max="100" value="50" id="ete-balance" style="flex:1;height:5px;border-radius:5px;outline:none;cursor:pointer;-webkit-appearance:none"/>
        <span class="balance-val" id="ete-bal-disp">50 / 50</span>
        <span class="balance-label" style="color:var(--danger)">Contradicts it</span>
      </div>
      <div class="technique-nav" style="margin-top:.75rem">
        <button class="btn-proceed" id="ete-done">Save & Continue →</button>
      </div>
    `;
    messagesEl.appendChild(w);
    scrollBottom();

    buildRowList(w.querySelector('#ete-for-col'), ['I did fail that time…', 'Someone criticized me…', 'I felt this way before…', 'Add another…'], 'for');
    buildRowList(w.querySelector('#ete-against-col'), ['I have also succeeded at…', 'Others have said I…', 'The facts show that…', 'Add another…'], 'against');

    const range = w.querySelector('#ete-balance');
    const disp  = w.querySelector('#ete-bal-disp');
    const updateSlider = () => {
      const v = parseInt(range.value);
      disp.textContent = v + ' / ' + (100-v);
      range.style.background = 'linear-gradient(to right, #4ade80 ' + v + '%, var(--danger) ' + v + '%)';
    };
    range.addEventListener('input', updateSlider);
    updateSlider();

    // Two separate AI buttons: one for each column
    const eteAiRow = document.createElement('div');
    eteAiRow.style.cssText = 'display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem';
    w.appendChild(eteAiRow);
    const forAiDiv = document.createElement('div'); eteAiRow.appendChild(forAiDiv);
    const againstAiDiv = document.createElement('div'); eteAiRow.appendChild(againstAiDiv);
    attachTherapist(forAiDiv, 'ete_for', () => 'Evidence FOR listed so far: ' + (getRowValues(w.querySelector('#ete-for-col')).join('; ') || 'none yet'));
    attachTherapist(againstAiDiv, 'ete_against', () => 'Evidence AGAINST listed so far: ' + (getRowValues(w.querySelector('#ete-against-col')).join('; ') || 'none yet'));
    w.appendChild(document.createElement('div')); // spacer

    w.querySelector('#ete-done').addEventListener('click', () => {
      const forIt = getRowValues(w.querySelector('#ete-for-col'));
      const against = getRowValues(w.querySelector('#ete-against-col'));
      if (!forIt.length && !against.length) { return; }
      const bal = parseInt(range.value);
      session.techniqueResults.ete = { for: forIt, against, balance: bal + ' for / ' + (100-bal) + ' against' };
      w.style.opacity = '.5';
      w.style.pointerEvents = 'none';
      userBubble('Evidence for: ' + (forIt.join(', ') || '—') + '\n\nEvidence against: ' + (against.join(', ') || '—') + '\n\nBalance: ' + bal + ' / ' + (100-bal));
      afterTechnique();
    });

  } else if (tid === 'socratic') {
    await botBubble('<strong style="color:var(--accent2)">Socratic Method</strong><br><br>Ask yourself probing questions that expose the hidden assumptions in your thought. Follow the logic until it contradicts itself.<br><br>For example: <em>"When I say I am a failure — do I mean I fail at some things sometimes, or at ALL things ALL the time?"</em><br><br>Write your questions and honest answers below, one pair per row.');

    const SOC_GUIDE = [
      { q: 'Do I mean this happens some of the time, or ALL the time, with EVERYONE?', tag: 'Overgeneralization' },
      { q: 'What is the actual evidence for and against this thought?', tag: 'Evidence' },
      { q: 'Am I confusing a feeling with a fact? ("I feel stupid" ≠ "I am stupid")', tag: 'Emotional Reasoning' },
      { q: 'Would I say this to a close friend in the same situation?', tag: 'Double Standard' },
      { q: 'What is the worst / best / most realistic outcome?', tag: 'Fortune Telling' },
      { q: 'In 5 years, will this matter as much as it feels right now?', tag: 'Perspective' },
      { q: 'Am I taking full blame for something that has multiple causes?', tag: 'Self-Blame' },
    ];

    const socW = document.createElement('div');
    socW.className = 'widget';
    socW.innerHTML = '<div class="widget-label">Socratic Method</div>'
      + '<div style="font-size:.75rem;color:var(--muted);margin-bottom:.75rem">Thought: <em style="color:var(--danger)">"' + escHtml(session.thought) + '"</em></div>'
      + '<div style="margin-bottom:.875rem;background:rgba(127,216,190,.06);border:1px solid rgba(127,216,190,.18);border-radius:10px;padding:.625rem .75rem">'
      + '<div style="font-size:.68rem;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;font-weight:600">💡 Common Socratic Questions — click to use</div>'
      + '<div style="display:flex;flex-direction:column;gap:.3rem" id="soc-guide-btns">'
      + SOC_GUIDE.map(g => '<button class="soc-guide-btn" data-q="' + escHtml(g.q) + '" style="text-align:left;background:rgba(127,216,190,.08);border:1px solid rgba(127,216,190,.2);border-radius:7px;padding:.3rem .5rem;cursor:pointer;display:flex;gap:.5rem;align-items:flex-start">'
        + '<span style="font-size:.65rem;color:var(--accent);background:rgba(127,216,190,.15);border-radius:4px;padding:.1rem .35rem;white-space:nowrap;margin-top:.1rem;flex-shrink:0">' + escHtml(g.tag) + '</span>'
        + '<span style="font-size:.76rem;color:var(--text);line-height:1.45">' + escHtml(g.q) + '</span></button>').join('')
      + '</div></div>'
      + '<div id="soc-rows" style="display:flex;flex-direction:column;gap:.5rem"></div>'
      + '<button class="add-row-btn" id="soc-add" style="margin-top:.375rem">+ Add your own question</button>'
      + '<div class="technique-nav" style="margin-top:.75rem"><button class="btn-proceed" id="soc-done">Save &amp; Continue →</button></div>';
    messagesEl.appendChild(socW);
    scrollBottom();

    // Guide button click: pre-fill a new row with that question
    socW.querySelectorAll('.soc-guide-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        addSocRow(btn.dataset.q);
        scrollBottom();
        btn.style.opacity = '.45';
        btn.style.pointerEvents = 'none';
      });
    });

    function addSocRow(prefill) {
      const container = socW.querySelector('#soc-rows');
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;flex-direction:column;gap:.3rem;padding:.625rem;background:var(--surface);border:1px solid var(--border);border-radius:9px';
      const qInp = document.createElement('input'); qInp.type='text'; qInp.className='list-row-input'; qInp.placeholder='Your question e.g. Does this apply to everything I do, always?'; qInp.style.fontStyle='italic'; qInp.style.color='var(--accent2)'; if (prefill) qInp.value = prefill;
      const aInp = document.createElement('input'); aInp.type='text'; aInp.className='list-row-input'; aInp.placeholder='Your honest answer...';
      const del = document.createElement('button'); del.className='list-row-del'; del.style.cssText='align-self:flex-end;font-size:.7rem;padding:.15rem .5rem'; del.textContent='Remove';
      del.addEventListener('click', () => { if (socW.querySelectorAll('#soc-rows > div').length > 1) row.remove(); });
      row.appendChild(qInp); row.appendChild(aInp); row.appendChild(del);
      container.appendChild(row);
    }
    addSocRow();
    socW.querySelector('#soc-add').addEventListener('click', () => { addSocRow(); scrollBottom(); });

    attachTherapist(socW, 'socratic', () => {
      const rows = Array.from(socW.querySelectorAll('#soc-rows > div'));
      return 'Q&A so far: ' + rows.map(r => { const inp = r.querySelectorAll('input'); return 'Q:' + inp[0].value + '/A:' + inp[1].value; }).join(' | ');
    });

    socW.querySelector('#soc-done').addEventListener('click', () => {
      const rows = Array.from(socW.querySelectorAll('#soc-rows > div'));
      const qa = rows.map(r => { const inp = r.querySelectorAll('input'); return { q: inp[0].value.trim(), a: inp[1].value.trim() }; }).filter(x => x.q || x.a);
      if (!qa.length) return;
      session.techniqueResults = session.techniqueResults || {};
      session.techniqueResults.socratic = qa;
      socW.style.opacity = '.5'; socW.style.pointerEvents = 'none';
      userBubble(qa.map(x => 'Q: ' + x.q + '\nA: ' + x.a).join('\n\n'));
      afterTechnique();
    });

  } else if (tid === 'shades') {
    await botBubble('<strong style="color:var(--accent2)">Thinking in Shades of Gray</strong><br><br>Instead of all-or-nothing, evaluate your thought on a spectrum. Use the slider to rate how true it really is, then write a more accurate, partial version that pinpoints the specific issue without condemning your whole self.');

    const shadesW = appendWidget(
      '<div class="widget-label">Thinking in Shades of Gray</div>'
      + '<div style="font-size:.75rem;color:var(--muted);margin-bottom:.625rem">Thought: <em style="color:var(--danger)">"' + escHtml(session.thought) + '"</em></div>'
      + '<div class="belief-slider-wrap" style="margin-bottom:.875rem">'
      + '<div style="font-size:.75rem;color:var(--muted);margin-bottom:.375rem">If 100% = completely true of me always, what is the real number?</div>'
      + '<div class="belief-slider-row"><input type="range" min="0" max="100" value="50" id="shades-range"/>'
      + '<div class="slider-val" id="shades-disp">50%</div></div></div>'
      + '<div style="font-size:.72rem;color:var(--accent);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.07em">Write a more accurate, partial version:</div>'
      + '<textarea class="chat-textarea" rows="3" id="shades-ta" placeholder="e.g. I struggled with this specific task today, but that does not mean I fail at everything..."></textarea>'
      + '<div class="technique-nav" style="margin-top:.75rem"><button class="btn-proceed" id="shades-done">Save &amp; Continue →</button></div>'
    );
    const sRng = shadesW.querySelector('#shades-range');
    const sDsp = shadesW.querySelector('#shades-disp');
    sRng.addEventListener('input', () => sDsp.textContent = sRng.value + '%');
    attachTherapist(shadesW, 'shades', () => 'Rating: ' + sRng.value + '% / Partial thought: "' + shadesW.querySelector('#shades-ta').value + '"');
    shadesW.querySelector('#shades-done').addEventListener('click', () => {
      const nuanced = shadesW.querySelector('#shades-ta').value.trim();
      if (!nuanced) { shadesW.querySelector('#shades-ta').style.borderColor='var(--danger)'; setTimeout(()=>shadesW.querySelector('#shades-ta').style.borderColor='',800); return; }
      session.techniqueResults = session.techniqueResults || {};
      session.techniqueResults.shades = { rating: parseInt(sRng.value), nuanced };
      shadesW.style.opacity = '.5'; shadesW.style.pointerEvents = 'none';
      userBubble('Real rating: ' + sRng.value + '%\nMore accurate thought: "' + nuanced + '"');
      afterTechnique();
    });

  } else if (tid === 'define') {
    await botBubble('<strong style="color:var(--accent2)">Let\'s Define Terms</strong> — Paul Hauck<br><br>Your thought contains a global label. The key question isn\'t just what it means — it\'s <em>how specific it actually is</em>.<br><br>"I\'m a failure" is a claim about everything, always. But no one fails at everything. Let\'s pin it down: a failure at <em>what</em>, <em>when</em>, in <em>which situation</em>?');

    const defW = appendWidget(
      '<div class="widget-label">Let\'s Define Terms</div>'
      + '<div style="font-size:.75rem;color:var(--muted);margin-bottom:.625rem">Thought: <em style="color:var(--danger)">"' + escHtml(session.thought) + '"</em></div>'
      + '<div style="display:flex;flex-direction:column;gap:.625rem">'
      + '<div><div style="font-size:.72rem;color:var(--accent);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.07em">What label am I applying to myself?</div>'
      + '<input type="text" class="list-row-input" id="def-label" placeholder="e.g. failure, loser, idiot" style="width:100%"></div>'
      + '<div><div style="font-size:.72rem;color:var(--accent);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.07em">A [label] at what, exactly? When and in which situation?</div>'
      + '<div style="font-size:.72rem;color:var(--muted);margin-bottom:.375rem;line-height:1.5">Make it specific and time-bound — one concrete instance, not &quot;always&quot;.</div>'
      + '<textarea class="chat-textarea" rows="2" id="def-meaning" placeholder="e.g. I failed to meet the deadline on the project at work last Tuesday…"></textarea></div>'
      + '<div><div style="font-size:.72rem;color:var(--accent);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.07em">Does that definition actually apply to you always?</div>'
      + '<div><div style="font-size:.72rem;color:var(--accent);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.07em">Does this one instance make you a [label] at everything, always?</div>'
      + '<textarea class="chat-textarea" rows="2" id="def-applies" placeholder="e.g. No — I have also managed X and Y. This was one situation where…"></textarea></div></div>'
    );
    attachTherapist(defW, 'define', () => 'Label:"' + defW.querySelector('#def-label').value + '"/Meaning:"' + defW.querySelector('#def-meaning').value + '"/Applies:"' + defW.querySelector('#def-applies').value + '"');
    defW.querySelector('#def-done').addEventListener('click', () => {
      const lbl = defW.querySelector('#def-label').value.trim();
      const meaning = defW.querySelector('#def-meaning').value.trim();
      const applies = defW.querySelector('#def-applies').value.trim();
      if (!lbl && !meaning && !applies) return;
      session.techniqueResults = session.techniqueResults || {};
      session.techniqueResults.define = { label: lbl, meaning, applies };
      defW.style.opacity = '.5'; defW.style.pointerEvents = 'none';
      userBubble('Label: "' + lbl + '"\nSpecific instance: ' + meaning + '\nDoes it generalise: ' + applies);
      afterTechnique();
    });



  } else if (tid === 'h4o') {
    const H4O_OPTIONS = [
      { id: 'tolerate', name: 'Tolerate without resentment',
        desc: 'Accept the situation fully and genuinely let go of the anger. You stay — and you make real peace with it.',
        note: 'This is a healthy choice, but genuine tolerance is harder than it sounds. The CBT work in this session will help build the emotional acceptance that makes it possible.',
        color: 'var(--accent)' },
      { id: 'protest',  name: 'Protest / Set a Boundary',
        desc: 'Speak up, confront the issue, or set a clear boundary. Introduce productive friction to try to change what's happening.',
        note: 'A clear head is essential before any confrontation. The work in this session will help you separate the facts from the distortions so you can act from clarity, not reactivity.',
        color: 'var(--accent2)' },
      { id: 'separate', name: 'Leave / Separate',
        desc: 'Remove yourself from the situation or relationship if it cannot change and cannot genuinely be accepted.',
        note: 'This is a legitimate option. The work ahead will help you think through this clearly before deciding.',
        color: '#a78bfa' },
      { id: 'resent',   name: 'Tolerate with resentment',
        desc: 'Stay in the situation and keep suffering. The most common choice — and according to Hauck, the most damaging.',
        note: 'Hauck considers this the worst option: you bear the costs of staying AND the costs of resentment. The CBT work ahead can help you move toward genuine acceptance or toward a real decision to act.',
        color: 'var(--danger)', warn: true },
    ];

    await botBubble(
      '<strong style="color:#a78bfa">Hauck's 4 Options</strong><br><br>'
      + 'When another person's behaviour is upsetting you, Hauck identifies four possible responses. '
      + 'Most people default to the fourth option without realising it.<br><br>'
      + 'Which best describes what you're currently doing — or what you're considering?'
    );

    const h4oW = appendWidget(
      '<div class="widget-label" style="color:#a78bfa">What is your response to this situation?</div>'
      + '<div id="h4o-option-list" style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:.75rem">'
      + H4O_OPTIONS.map(o =>
          '<div class="h4o-card' + (o.warn ? ' warn' : '') + '" data-id="' + o.id + '">'
          + '<div class="h4o-name" style="color:' + o.color + '">' + o.name + '</div>'
          + '<div class="h4o-desc">' + o.desc + '</div>'
          + (o.warn ? '<div class="h4o-warn">⚠ Hauck considers this the worst option.</div>' : '')
          + '</div>'
        ).join('')
      + '</div>'
      + '<div style="font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.375rem;font-weight:600">Reflection — why this option?</div>'
      + '<textarea class="chat-textarea" id="h4o-reflection" rows="2" placeholder="What makes this feel like the right or default choice right now?"></textarea>'
      + '<div class="technique-nav" style="margin-top:.75rem">'
      + '<button class="btn-proceed" id="h4o-done" disabled>Save & Continue →</button>'
      + '</div>'
    );

    let h4oSelected = null;
    const doneBtn = h4oW.querySelector('#h4o-done');
    const reflectionTa = h4oW.querySelector('#h4o-reflection');

    function updateH4O() {
      doneBtn.disabled = !h4oSelected || !reflectionTa.value.trim();
    }
    reflectionTa.addEventListener('input', updateH4O);

    h4oW.querySelectorAll('.h4o-card').forEach(card => {
      card.addEventListener('click', () => {
        h4oW.querySelectorAll('.h4o-card').forEach(c => {
          c.classList.remove('selected');
          c.querySelector('.h4o-name').style.fontWeight = '600';
        });
        card.classList.add('selected');
        h4oSelected = card.dataset.id;
        updateH4O();
      });
    });

    attachTherapist(h4oW, 'h4o', () =>
      'Option selected: ' + (h4oSelected || 'none') + '. Reflection: "' + (reflectionTa.value || '') + '"'
    );

    h4oW.querySelector('#h4o-done').addEventListener('click', async () => {
      const reflection = reflectionTa.value.trim();
      if (!h4oSelected || !reflection) return;
      h4oW.style.opacity = '.5';
      h4oW.style.pointerEvents = 'none';

      const opt = H4O_OPTIONS.find(o => o.id === h4oSelected);
      userBubble(opt.name + '\n\n' + reflection);

      session.techniqueResults = session.techniqueResults || {};
      session.techniqueResults.h4o = { option: h4oSelected, optionName: opt.name, reflection };

      await botBubble(opt.note);
      afterTechnique();
    });

  } else if (tid === 'sfc') {
    await botBubble(
      '<strong style="color:#a78bfa">Self-Forgiveness Check</strong> — Paul Hauck<br><br>'
      + 'Hauck argues that you can <em>always</em> justify forgiving yourself using one of three reasons. '
      + 'Not as an excuse — but because they\'re genuinely true.<br><br>'
      + '<strong>The three reasons:</strong><br>'
      + '① <strong>Deficiency</strong> — you lacked the talent, ability, or resources to do better<br>'
      + '② <strong>Ignorance</strong> — you didn\'t know any better at the time<br>'
      + '③ <strong>Disturbance</strong> — you were under stress, upset, or overwhelmed<br><br>'
      + 'At least one of these is almost always true. Let\'s find yours.'
    );

    const sfcW = appendWidget(
      '<div class="widget-label" style="color:#a78bfa">Self-Forgiveness Check</div>'
      + '<div style="font-size:.75rem;color:var(--muted);margin-bottom:.875rem">Thought: <em style="color:var(--danger)">"' + escHtml(session.thought) + '"</em></div>'

      // Three reason cards
      + '<div style="font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;font-weight:600">Which reasons apply? Select all that do.</div>'
      + '<div id="sfc-reasons" style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:.875rem">'

      + '<div class="sfc-reason-card" data-id="deficiency" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;cursor:pointer;transition:border-color .15s">'
      + '<div style="font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:.2rem">① Deficiency</div>'
      + '<div style="font-size:.75rem;color:var(--muted);line-height:1.5">I lacked the ability, talent, resources, or maturity to do better at that time.</div>'
      + '</div>'

      + '<div class="sfc-reason-card" data-id="ignorance" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;cursor:pointer;transition:border-color .15s">'
      + '<div style="font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:.2rem">② Ignorance</div>'
      + '<div style="font-size:.75rem;color:var(--muted);line-height:1.5">I didn\'t know any better. I hadn\'t been taught, hadn\'t experienced this before, or didn\'t have the information I needed.</div>'
      + '</div>'

      + '<div class="sfc-reason-card" data-id="disturbance" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;cursor:pointer;transition:border-color .15s">'
      + '<div style="font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:.2rem">③ Disturbance</div>'
      + '<div style="font-size:.75rem;color:var(--muted);line-height:1.5">I was stressed, scared, exhausted, overwhelmed, or emotionally upset. I wasn\'t at my best.</div>'
      + '</div>'

      + '</div>'

      // Reflection textarea
      + '<div style="font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.375rem;font-weight:600">In your own words — why does this apply to you?</div>'
      + '<textarea class="chat-textarea" rows="3" id="sfc-reflection" placeholder="e.g. I was going through a very difficult time and simply didn\'t have the capacity to handle it differently…"></textarea>'

      + '<div class="technique-nav" style="margin-top:.75rem">'
      + '<button class="btn-proceed" id="sfc-done" disabled>Complete Self-Forgiveness Check →</button>'
      + '</div>'
    );

    const selected = new Set();
    const cards = sfcW.querySelectorAll('.sfc-reason-card');
    const doneBtn = sfcW.querySelector('#sfc-done');
    const reflection = sfcW.querySelector('#sfc-reflection');

    function updateSFCState() {
      doneBtn.disabled = selected.size === 0 || !reflection.value.trim();
    }

    cards.forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.id;
        if (selected.has(id)) {
          selected.delete(id);
          card.style.borderColor = 'var(--border)';
          card.style.background = 'var(--surface)';
          card.querySelector('div').style.color = 'var(--text)';
        } else {
          selected.add(id);
          card.style.borderColor = '#a78bfa';
          card.style.background = 'rgba(167,139,250,.08)';
          card.querySelector('div').style.color = '#a78bfa';
        }
        updateSFCState();
      });
    });

    reflection.addEventListener('input', updateSFCState);

    attachTherapist(sfcW, 'sfc', () =>
      'Reasons selected: ' + (Array.from(selected).join(', ') || 'none yet')
      + '. Reflection so far: "' + (reflection.value || 'nothing yet') + '"'
    );

    sfcW.querySelector('#sfc-done').addEventListener('click', async () => {
      const reasons = Array.from(selected);
      const reflectionText = reflection.value.trim();
      if (!reasons.length || !reflectionText) return;

      sfcW.style.opacity = '.5';
      sfcW.style.pointerEvents = 'none';

      const reasonLabels = { deficiency: 'Deficiency', ignorance: 'Ignorance', disturbance: 'Disturbance' };
      const reasonText = reasons.map(r => reasonLabels[r]).join(' + ');
      userBubble('Reasons: ' + reasonText + '\n\n' + reflectionText);

      session.techniqueResults = session.techniqueResults || {};
      session.techniqueResults.sfc = { reasons, reflection: reflectionText };

      // Closing synthesis message
      const synthLines = [];
      if (reasons.includes('deficiency'))  synthLines.push('You were doing the best you could with the abilities and resources you had at the time.');
      if (reasons.includes('ignorance'))   synthLines.push('You acted on the knowledge and experience available to you — you couldn\'t have known what you hadn\'t yet learned.');
      if (reasons.includes('disturbance')) synthLines.push('You were not at your best. Stressed and overwhelmed people make different decisions than calm ones — that\'s human.');
      synthLines.push('<strong style="color:#a78bfa">None of this makes the behavior acceptable if it caused harm — but it makes <em>you</em> forgivable. The action can be criticized. You, as a person, cannot be reduced to it.</strong>');

      await botBubble(synthLines.join('<br><br>'));
      afterTechnique();
    });

  } else if (tid === 'ev') {
    await runEV();
  }
}

async function afterTechnique() {
  if (sessionToken !== (window._lastAfterTechToken = sessionToken)) return;
  session.techniques = session.techniques || [];
  const all = ['cba', 'ete', 'socratic', 'shades', 'define', 'ev', 'sfc', 'h4o'];
  const remaining = all.filter(id => !session.techniques.includes(id));
  const techNames = { cba: 'Cost-Benefit Analysis', ete: 'Examine the Evidence', socratic: 'Socratic Method', shades: 'Thinking in Shades of Gray', define: "Let's Define Terms", ev: 'Externalization of Voices', sfc: 'Self-Forgiveness Check', h4o: "Hauck's 4 Options" };

  if (remaining.length === 0) {
    await botBubble(`You've completed both techniques. That's deep work — now let's channel all of this into your Rational Response.`);
    runStage(6);
    return;
  }

  await botBubble(`Solid work. Would you like to try another technique, or are you ready to write your Rational Response?`);

  const navW = appendWidget(`

    runStage(5);

    navW.style.opacity = '.5';
    navW.style.pointerEvents = 'none';
    userBubble('I\'m ready to write my Rational Response');
    runStage(6);
  });
}

async function runEVInApp() {
  const myEvToken = sessionToken;
  const allThoughts = session.thoughts && session.thoughts.length > 1
    ? session.thoughts : [session.thought];

  session.techniqueResults = session.techniqueResults || {};

// ─── Single EV Round ─────────────────────────────────────
async function runEVRound(thought, thoughtNum, totalThoughts, evToken) {
  const roundLabel = totalThoughts > 1 ? 'Thought ' + thoughtNum + ' of ' + totalThoughts : 'Your Thought';

  // Build attack
  const attackW = document.createElement('div');
  attackW.className = 'widget';
  attackW.innerHTML =
    '<div class="ev-phase-label">' + roundLabel + '</div>'
    + '<div class="ev-attack-bubble"><div class="ev-attack-label">🔴 Negative Voice</div>'
    + '<div class="ev-attack-text" id="ev-attack-text">…</div></div>'
    + '<div class="win-meter">'
    + '<div class="win-dot" id="ev-dot-small">SMALL</div>'
    + '<div class="win-dot" id="ev-dot-big">BIG</div>'
    + '<div class="win-dot" id="ev-dot-huge">HUGE</div>'
    + '</div>'
    + '<div class="ev-defense-area">'
    + '<div style="font-size:.72rem;color:var(--muted);margin-bottom:.3rem">Defend yourself — speak as "I":</div>'
    + '<textarea class="ev-defense-ta" id="ev-defense-ta" placeholder="I disagree because…" rows="3"></textarea>'
    + '<button class="ev-submit-defense" id="ev-submit">Submit Defense</button>'
    + '</div>'
    + '<div id="ev-feedback-area"></div>';

  messagesEl.appendChild(attackW);
  scrollBottom();

  // Generate AI attack
  const attackContext = sessionContext() + '\n\nThe specific negative thought to attack: "' + thought + '"';
  let attackText = '';
  try {
    attackW.querySelector('#ev-attack-text').textContent = '…thinking…';
    attackText = await callAI(STEP_PROMPTS.ev_attack, attackContext);
    attackW.querySelector('#ev-attack-text').textContent = attackText;
  } catch(e) {
    attackW.querySelector('#ev-attack-text').textContent = 'You — ' + thought;
    attackText = thought;
  }
  scrollBottom();

  // Defense loop — keep going until HUGE WIN
  let won = false;
  let attemptCount = 0;
  const maxAttempts = 4;

  while (!won && attemptCount < maxAttempts) {
    attemptCount++;
    const defense = await waitForDefense(attackW, evToken);
    if (!defense) break;

    // Score the defense
    const feedbackArea = attackW.querySelector('#ev-feedback-area');
    feedbackArea.innerHTML = '<div class="ev-feedback" style="color:var(--muted)">Scoring your defense…</div>';
    scrollBottom();

    let scoreRaw = '';
    try {
      const scoreCtx = sessionContext()
        + '\n\nNEGATIVE THOUGHT: "' + thought + '"'
        + '\n\nATTACK GIVEN: "' + attackText + '"'
        + '\n\nUSER DEFENSE: "' + defense + '"';
      scoreRaw = await callAI(STEP_PROMPTS.ev_score, scoreCtx);
    } catch(e) {
      scoreRaw = 'SCORE: BIG WIN\nFEEDBACK: Good defense — keep strengthening it.';
    }

    // Parse score
    const scoreLine = scoreRaw.match(/SCORE:\s*(SMALL WIN|BIG WIN|HUGE WIN)/i);
    const feedbackLine = scoreRaw.match(/FEEDBACK:\s*(.+)/i);
    const score = scoreLine ? scoreLine[1].toUpperCase() : 'BIG WIN';
    const feedback = feedbackLine ? feedbackLine[1].trim() : scoreRaw;

    // Update win meter
    attackW.querySelector('#ev-dot-small').className = 'win-dot' + (score === 'SMALL WIN' ? ' small' : '');
    attackW.querySelector('#ev-dot-big').className = 'win-dot' + (score === 'BIG WIN' ? ' big' : '');
    attackW.querySelector('#ev-dot-huge').className = 'win-dot' + (score === 'HUGE WIN' ? ' huge' : '');

    feedbackArea.innerHTML = '<div class="ev-feedback">' + escHtml(feedback) + '</div>';

    if (score === 'HUGE WIN') {
      won = true;
      feedbackArea.innerHTML += '<div style="font-size:.8rem;color:#4ade80;margin-top:.375rem;font-weight:600">✦ Huge win. Your positive voice wins this one.</div>';
      // Disable further input
      attackW.querySelector('#ev-defense-ta').disabled = true;
      attackW.querySelector('#ev-submit').style.display = 'none';
      if (sessionToken === evToken) session.techniqueResults.ev.rounds.push({ thought, attack: attackText, defense, score });
      scrollBottom();
      break;
    }

    // Not huge — offer role reversal after 2nd failed attempt
    if (attemptCount === 2 && !won) {
      await offerRoleReversal(attackW, thought, attackText, feedbackArea);
    } else if (!won) {
      feedbackArea.innerHTML += '<div style="font-size:.76rem;color:var(--muted);margin-top:.25rem">Try again — aim for a response with no openings left.</div>';
      // Re-enable
      attackW.querySelector('#ev-defense-ta').value = '';
    }
    scrollBottom();
  }

  if (!won) {
    // Max attempts reached — acknowledge and move on
    const feedbackArea = attackW.querySelector('#ev-feedback-area');
    feedbackArea.innerHTML += '<div style="font-size:.78rem;color:var(--muted);margin-top:.5rem;padding:.5rem;background:var(--surface);border-radius:8px">That\'s okay — this thought may need more practice. Keep these defenses in mind as you write your Rational Response.</div>';
    attackW.querySelector('#ev-submit').style.display = 'none';
    scrollBottom();
  }
}

// ─── Wait for user to click Submit Defense ───────────────
function waitForDefense(attackW, evToken) {
  return new Promise(resolve => {
    const btn = attackW.querySelector('#ev-submit');
    const ta = attackW.querySelector('#ev-defense-ta');
    if (!btn || !ta) { resolve(null); return; }
    // Always ensure button is enabled when waiting for input
    btn.disabled = false;
    btn.style.display = '';
    ta.disabled = false;
    ta.focus();
    let resolved = false;
    const tokenCheck = setInterval(() => {
      if (sessionToken !== evToken) {
        clearInterval(tokenCheck);
        btn.removeEventListener('click', handler);
        if (!resolved) { resolved = true; resolve(null); }
      }
    }, 500);
    function handler() {
      if (sessionToken !== evToken) { clearInterval(tokenCheck); if (!resolved) { resolved = true; resolve(null); } return; }
      const val = ta.value.trim();
      if (!val) { ta.style.borderColor = 'var(--danger)'; setTimeout(() => ta.style.borderColor = '', 600); return; }
      clearInterval(tokenCheck);
      btn.removeEventListener('click', handler);
      btn.disabled = true;
      resolved = true;
      resolve(val);
    }
    btn.addEventListener('click', handler);
  });
}

// ─── Role Reversal ────────────────────────────────────────
async function offerRoleReversal(attackW, thought, originalAttack, feedbackArea) {
  feedbackArea.innerHTML +=
    '<div style="margin-top:.625rem;padding:.75rem;background:var(--surface);border:1px solid var(--border);border-radius:10px">'
    + '<div style="font-size:.72rem;color:#f59e0b;font-weight:600;margin-bottom:.3rem">↩ Role Reversal — you play the negative voice</div>'
    + '<div style="font-size:.75rem;color:var(--muted);margin-bottom:.5rem;line-height:1.5">You\'re stuck. Try switching sides: type the strongest version of this attack, then I\'ll model a HUGE WIN defense for you.</div>'
    + '<textarea class="ev-defense-ta" id="ev-reversal-ta" placeholder="You are… (write the attack as the negative voice)" rows="2" style="border-color:rgba(245,158,11,.4)"></textarea>'
    + '<button class="ev-submit-defense" id="ev-reversal-submit" style="background:#f59e0b;margin-top:.3rem">Show Me a Huge Win →</button>'
    + '</div>';
  scrollBottom();

  await new Promise(resolve => {
    const btn = feedbackArea.querySelector('#ev-reversal-submit');
    const ta = feedbackArea.querySelector('#ev-reversal-ta');
    btn.addEventListener('click', async () => {
      const userAttack = ta.value.trim();
      if (!userAttack) return;
      btn.disabled = true;
      ta.disabled = true;
      btn.textContent = 'Modeling defense…';

      try {
        const modelCtx = sessionContext()
          + '\n\nOriginal negative thought: "' + thought + '"'
          + '\n\nThe attack to defend against: "' + userAttack + '"';
        const modeledDefense = await callAI(STEP_PROMPTS.ev_model, modelCtx);

        feedbackArea.querySelector('div:last-child').insertAdjacentHTML('beforeend',
          '<div class="ev-model-bubble" style="margin-top:.5rem">'
          + '<div class="ev-model-label">✦ Modeled Huge Win Defense</div>'
          + '<div class="ev-model-text">' + escHtml(modeledDefense) + '</div></div>'
          + '<div style="font-size:.75rem;color:var(--muted);margin-top:.375rem">Now adapt this in your own words and try your defense again above.</div>'
        );
      } catch(e) {
        feedbackArea.querySelector('div:last-child').insertAdjacentHTML('beforeend',
          '<div style="font-size:.75rem;color:var(--muted);margin-top:.375rem">Try thinking about what a compassionate friend would say to you about this thought.</div>'
        );
      }
      scrollBottom();
      resolve();
    });
  });
}
